const api={
  load:()=>fetch("/api/data").then(r=>r.json()),
  save:(k,b)=>fetch("/api/"+k,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(b)}),
};
const toMin=t=>{if(!t||!t.includes(":"))return null;const[h,m]=t.split(":").map(Number);return h*60+m;};
const calcOT=r=>{
  const s=toMin(r.timeStart),e=toMin(r.timeExpected),a=toMin(r.timeActual);
  if(s===null||e===null||a===null)return null;
  const planned=e-s,actual=a-s;
  if(planned<=0)return null;
  const overMin=actual-planned;
  return{overMin,overPct:parseFloat(((overMin/planned)*100).toFixed(1)),planned,actual,isOver:overMin>0};
};
const autoStatus=ot=>{if(!ot)return"PENDING";if(!ot.isOver)return"GOOD";if(ot.overPct<=15)return"OK";return"LATE";};
const scColor=s=>s==="GOOD"?"#2ECC71":s==="OK"?"#F1C40F":s==="LATE"?"#E74C3C":"#7A7F8E";

const calcAutoScore=(staffId,vehicles,maxScore)=>{
  const mine=vehicles.filter(v=>(v.staffIds||[]).includes(staffId)&&v.timeStart&&v.timeExpected&&v.timeActual);
  if(!mine.length)return maxScore;
  let totalPct=0;
  mine.forEach(v=>{
    const ot=calcOT(v);
    if(ot&&ot.isOver){
      const share=(v.staffIds||[]).length||1;
      totalPct+=ot.overPct/share;
    }
  });
  const avgPct=totalPct/mine.length;
  return Math.max(0,parseFloat((maxScore-avgPct*0.15).toFixed(1)));
};

const getGrade=(score,threshold,bonusCfg)=>{
  const tiers=[...bonusCfg.tiers].sort((a,b)=>b.minScore-a.minScore);
  for(const t of tiers){if(score>=t.minScore)return t;}
  return{...tiers[tiers.length-1],amount:0};
};

function SI({value,max,onChange,locked}){
  const p=max>0?Math.min(value/max,1):0;
  const c=p>=0.8?"#2ECC71":p>=0.5?"#F1C40F":"#E74C3C";
  return(
    <div style={{display:"flex",alignItems:"center",gap:7}}>
      <input type="number" min={0} max={max} value={value} disabled={locked}
        onChange={e=>!locked&&onChange(Math.min(max,Math.max(0,Number(e.target.value))))}
        style={{...S.inp,width:54,padding:"5px",fontFamily:"'IBM Plex Mono',monospace",fontSize:14,fontWeight:700,textAlign:"center",border:`2px solid ${locked?B.border:c}`,background:locked?B.border:B.dark,color:locked?B.muted:c}}/>

      </div>
      <span style={{fontSize:10,color:B.muted,minWidth:20,fontFamily:"monospace"}}>/{max}</span>
    </div>
  );
}

  const sendFeedback=()=>{
    if(!msg.trim()){alert(t.feedbackEmpty);return;}
    const newFb={id:Date.now(),msg:msg.trim(),time:new Date().toLocaleString(),read:false,
      _sender:isAnon?"匿名":user.name,_dept:isAnon?"":user.dept||user.role,_isAnon:isAnon};
    const upd=[newFb,...feedbacks];

    setMsg("");setSent(true);

                  {f._isAnon

                      </button>
                    :<span style={{color:"#3498DB",fontSize:10,fontWeight:700}}>👤 {f._sender}{f._dept?" · "+f._dept:""}</span>
                  }
                </div>

                  <span style={{color:B.muted,fontSize:10}}>{f.time}</span>
                  <button onClick={()=>deleteFb(f.id)} style={{...S.btn("#2B0009","#E74C3C",{fontSize:10,padding:"3px 8px"})}}>{t.feedbackDelete}</button>

function PersonalStats({user,vehicles}){
  const {t}=useLang();
  const today=new Date().toISOString().split("T")[0];
  const [range,setRange]=useState("month");
  const [custom,setCustom]=useState({from:today,to:today});

  const parseDate=d=>{
    if(!d)return null;
    if(d.includes("-"))return new Date(d);
    const[dd,mm,yyyy]=d.split(".");
    if(!yyyy)return null;
    return new Date(`${yyyy}-${mm.padStart(2,"0")}-${dd.padStart(2,"0")}`);
  };

  const getRangeDates=()=>{
    const now=new Date();
    if(range==="today"){const s=new Date(now);s.setHours(0,0,0,0);return{from:s,to:now};}
    if(range==="week"){const s=new Date(now);s.setDate(now.getDate()-7);return{from:s,to:now};}
    if(range==="month"){const s=new Date(now.getFullYear(),now.getMonth(),1);return{from:s,to:now};}
    return{from:new Date(custom.from),to:new Date(custom.to+"T23:59:59")};
  };

  const myVehicles=useMemo(()=>{
    const{from,to}=getRangeDates();
    return vehicles.filter(v=>{
      if(!(v.staffIds||[]).includes(user.id))return false;
      const d=parseDate(v.date);
      if(!d)return true;
      return d>=from&&d<=to;
    });
  },[vehicles,range,custom,user.id]);

  const stats=useMemo(()=>{
    let totalWorkMin=0,totalOTMin=0,totalOTPct=0,onTime=0;
    myVehicles.forEach(v=>{
      const ot=calcOT(v);
      if(ot){
        totalWorkMin+=ot.actual;
        const share=(v.staffIds||[]).length||1;
        if(ot.isOver){totalOTMin+=ot.overMin/share;totalOTPct+=ot.overPct/share;}
        else onTime++;
      }
    });
    const avgOTPct=myVehicles.length>0?totalOTPct/myVehicles.length:0;
    const autoScore=Math.max(0,parseFloat((15-avgOTPct*0.15).toFixed(1)));
    const onTimeRate=myVehicles.length>0?Math.round((onTime/myVehicles.length)*100):100;
    return{total:myVehicles.length,totalWorkMin:Math.round(totalWorkMin),totalOTMin:Math.round(totalOTMin),avgOTPct:avgOTPct.toFixed(1),autoScore,onTimeRate};
  },[myVehicles]);

  const fmtMin=m=>{const h=Math.floor(m/60),mn=m%60;return h>0?`${h}h ${mn}m`:`${mn}m`;};

  return(
    <div>
      <div style={{color:B.text,fontSize:17,fontWeight:800,marginBottom:14}}>{t.myEfficiency}</div>
      <div style={{...S.card(),padding:13,marginBottom:14}}>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:range==="custom"?12:0}}>
          {[["today",t.today],["week",t.thisWeek],["month",t.thisMonth],["custom",t.custom]].map(([v,l])=>(
            <button key={v} onClick={()=>setRange(v)} style={{...S.btn(range===v?B.red:B.border,range===v?"#fff":B.muted,{fontSize:11,padding:"5px 11px"})}}>{l}</button>
          ))}
        </div>
        {range==="custom"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:10}}>
          <div><div style={{color:B.muted,fontSize:10,marginBottom:3}}>{t.from}</div><input type="date" value={custom.from} onChange={e=>setCustom(c=>({...c,from:e.target.value}))} style={S.inp}/></div>
          <div><div style={{color:B.muted,fontSize:10,marginBottom:3}}>{t.to}</div><input type="date" value={custom.to} onChange={e=>setCustom(c=>({...c,to:e.target.value}))} style={S.inp}/></div>
        </div>}
      </div>

  );
}

// ── EXPORT VEHICLE REPORT ────────────────────────────
function exportVehicleReport(vehicles,allUsers){
  const now=new Date();
  const dateStr=now.toLocaleDateString("en-GB").replace(/\//g,"-");
  const timeStr=now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});

  const statusColor=s=>s==="GOOD"?"#2ECC71":s==="OK"?"#F1C40F":s==="LATE"?"#E74C3C":s==="PENDING"?"#7A7F8E":"#7A7F8E";
  const statusBg=s=>s==="GOOD"?"#0D2B19":s==="OK"?"#2B2300":s==="LATE"?"#2B0009":s==="PENDING"?"#1A1A1A":"#1A1A1A";

  const rows=vehicles.map(v=>{
    const ot=v.overtime||calcOT(v);
    const techs=(v.staffIds||[]).map(id=>{const u=allUsers.find(u=>u.id===id);return u?u.name:"";}).filter(Boolean).join(", ");
    const otText=ot?(ot.isOver?`+${ot.overMin}m`:"-"+Math.abs(ot.overMin)+"m"):"—";
    const otColor=ot?(ot.isOver?"#E74C3C":"#2ECC71"):"#7A7F8E";
    const sc=v.status||"PENDING";
    return `
      <tr>
        <td>${v.no||""}</td>
        <td>${v.date||""}</td>
        <td style="font-weight:700;color:#fff">${v.plate||""}</td>
        <td>${v.model||""}</td>
        <td style="font-family:monospace">${v.timeIn||"—"}</td>
        <td style="font-family:monospace">${v.timeStart||"—"}</td>
        <td style="font-family:monospace">${v.timeExpected||"—"}</td>
        <td style="font-family:monospace">${v.timeActual||"—"}</td>
        <td style="color:${otColor};font-weight:700;font-family:monospace">${otText}</td>
        <td><span style="background:${statusBg(sc)};color:${statusColor(sc)};border-radius:4px;padding:2px 8px;font-weight:700;font-size:11px">${sc}</span></td>
        <td>${techs||"—"}</td>
        <td style="color:#aaa">${v.createdByName||"—"}</td>
      </tr>`;
  }).join("");

  const summary={total:vehicles.length,good:vehicles.filter(v=>v.status==="GOOD").length,ok:vehicles.filter(v=>v.status==="OK").length,late:vehicles.filter(v=>v.status==="LATE").length,pending:vehicles.filter(v=>v.status==="PENDING").length};

  const html=`<!DOCTYPE html>
<html><head><meta charset="UTF-8"/>
<title>KC Auto Performance - Vehicle Report</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0F1117;color:#E0E0E0;font-family:Arial,sans-serif;padding:24px;}
  .header{text-align:center;margin-bottom:28px;padding-bottom:20px;border-bottom:2px solid #D0021B;}
  .logo{font-size:32px;font-weight:900;font-style:italic;letter-spacing:-1px;margin-bottom:6px;}
  .logo span{color:#D0021B;}
  .logo em{color:#fff;font-style:normal;}
  .subtitle{color:#aaa;font-size:13px;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px;}
  .report-date{color:#666;font-size:12px;}
  .summary{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
  .sum-card{background:#16191F;border:1px solid #2a2d35;border-radius:8px;padding:12px 18px;text-align:center;flex:1;min-width:80px;}
  .sum-val{font-size:22px;font-weight:900;font-family:monospace;}
  .sum-label{font-size:10px;color:#666;margin-top:2px;text-transform:uppercase;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  th{background:#1A1D24;color:#666;padding:9px 10px;text-align:left;border-bottom:2px solid #2a2d35;font-size:10px;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;}
  td{padding:8px 10px;border-bottom:1px solid #1e2128;color:#ccc;vertical-align:middle;}
  tr:hover td{background:#16191F;}
  .footer{text-align:center;color:#444;font-size:10px;margin-top:20px;padding-top:16px;border-top:1px solid #1e2128;}
</style>
</head><body>
<div class="header">
  <div class="logo"><span>KC</span> <em>AUTO PERFORMANCE</em></div>
  <div class="subtitle">Vehicle Performance Report</div>
  <div class="report-date">Generated: ${dateStr} ${timeStr}</div>
</div>
<div class="summary">
  <div class="sum-card"><div class="sum-val" style="color:#3498DB">${summary.total}</div><div class="sum-label">Total</div></div>
  <div class="sum-card"><div class="sum-val" style="color:#2ECC71">${summary.good}</div><div class="sum-label">Good</div></div>
  <div class="sum-card"><div class="sum-val" style="color:#F1C40F">${summary.ok}</div><div class="sum-label">OK</div></div>
  <div class="sum-card"><div class="sum-val" style="color:#E74C3C">${summary.late}</div><div class="sum-label">Late</div></div>
  <div class="sum-card"><div class="sum-val" style="color:#7A7F8E">${summary.pending}</div><div class="sum-label">Pending</div></div>
</div>
<table>
  <thead><tr>
    <th>No</th><th>Date</th><th>Plate</th><th>Model</th>
    <th>Check-In</th><th>Start</th><th>Expected</th><th>Actual</th>

<div class="footer">KC Auto Performance · ${dateStr} · Total ${summary.total} vehicles</div>
</body></html>`;

  const blob=new Blob([html],{type:"text/html;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=`KC_Vehicle_Report_${dateStr}.html`;
  a.click();

// ── VEHICLE TRACKER ──────────────────────────────────
function VehicleTracker({user,vehicles,setVehicles,allUsers,appointments,setTab}){
  const {t}=useLang();
  const today=new Date().toISOString().split("T")[0];
  const staffList=allUsers.filter(u=>u.role!=="boss");
  const emptyF={plate:"",model:"",timeIn:"",timeStart:"",timeExpected:"",timeActual:"",staffIds:[],notes:"",date:new Date().toLocaleDateString("en-GB").replace(/\//g,".")};
  const [showAdd,setShowAdd]=useState(false);
  const [editId,setEditId]=useState(null);
  const [form,setForm]=useState(emptyF);
  const [uploading,setUploading]=useState(false);
  const [aiResult,setAiResult]=useState(null);
  const [detailVehicle,setDetailVehicle]=useState(null);
  const fRef=useRef();

  // Today's appointments not yet converted to vehicles
  const todayAppts=(appointments||[]).filter(a=>{
    if(a.date!==today)return false;
    if(a.status==="cancelled"||a.status==="done")return false;
    // Check if already converted
    const alreadyIn=vehicles.some(v=>v.plate===a.plate&&v.date===new Date().toLocaleDateString("en-GB").replace(/\//g,"."));
    return !alreadyIn;
  });

  const convertAppt=(appt)=>{
    const newRecord={
      ...emptyF,
      plate:appt.plate||"",
      model:appt.model||"",
      date:new Date().toLocaleDateString("en-GB").replace(/\//g,"."),
      notes:(appt.services||[]).join(", ")+(appt.notes?" | "+appt.notes:""),
      staffIds:appt.techId?[appt.techId]:[],
      fromAppointment:appt.id,
    };
    setForm(newRecord);
    setEditId(null);
    setShowAdd(true);
  };

  // ── FILTERS ──
  const [fDate,setFDate]=useState("all");
  const [fCustom,setFCustom]=useState({from:today,to:today});
  const [fModel,setFModel]=useState("");
  const [fStatus,setFStatus]=useState("all");
  const [fCreator,setFCreator]=useState("all");
  const [showFilters,setShowFilters]=useState(false);

  const parseVDate=d=>{
    if(!d)return null;
    if(d.includes("-"))return new Date(d);
    const[dd,mm,yyyy]=d.split(".");
    if(!yyyy)return null;
    return new Date(`${yyyy}-${mm.padStart(2,"0")}-${dd.padStart(2,"0")}`);
  };

  const filteredVehicles=useMemo(()=>{
    return vehicles.filter(v=>{
      // Date filter
      if(fDate!=="all"){
        const vd=parseVDate(v.date);
        const now=new Date();
        if(fDate==="today"){const s=new Date(now);s.setHours(0,0,0,0);if(!vd||vd<s)return false;}
        else if(fDate==="week"){const s=new Date(now);s.setDate(now.getDate()-7);if(!vd||vd<s)return false;}
        else if(fDate==="month"){const s=new Date(now.getFullYear(),now.getMonth(),1);if(!vd||vd<s)return false;}
        else if(fDate==="custom"){
          const s=new Date(fCustom.from);const e=new Date(fCustom.to+"T23:59:59");
          if(!vd||vd<s||vd>e)return false;
        }
      }
      // Model filter
      if(fModel&&!v.model?.toLowerCase().includes(fModel.toLowerCase())&&!v.plate?.toLowerCase().includes(fModel.toLowerCase()))return false;
      // Status filter
      if(fStatus!=="all"&&v.status!==fStatus)return false;
      // Creator filter
      if(fCreator!=="all"&&v.createdByName!==fCreator)return false;
      return true;
    });
  },[vehicles,fDate,fCustom,fModel,fStatus,fCreator]);

  const uniqueCreators=[...new Set(vehicles.map(v=>v.createdByName).filter(Boolean))];
  const uniqueModels=[...new Set(vehicles.map(v=>v.model).filter(Boolean))];
  const activeFilters=(fDate!=="all"?1:0)+(fModel?1:0)+(fStatus!=="all"?1:0)+(fCreator!=="all"?1:0);

  const canEdit=user.role==="boss"||user.role==="manager"||user.role==="tech_head"||user.canVehicle||user.canManage;
  const save=v=>{setVehicles(v);api.save("vehicles",v);};

  const toggleStaff=id=>{
    setForm(f=>{
      const ids=f.staffIds||[];
      if(ids.includes(id))return{...f,staffIds:ids.filter(x=>x!==id)};
      if(ids.length>=4)return f;
      return{...f,staffIds:[...ids,id]};
    });
  };

  const submitForm=()=>{
    const ot=calcOT(form);const status=autoStatus(ot);
    if(editId){save(vehicles.map(v=>v.id===editId?{...v,...form,overtime:ot,status,createdBy:v.createdBy||user.id,createdByName:v.createdByName||user.name}:v));setEditId(null);}
    else{save([...vehicles,{...form,id:Date.now(),no:vehicles.length+1,overtime:ot,status,createdBy:user.id,createdByName:user.name}]);}
    setForm(emptyF);setShowAdd(false);
  };

  const upload=async e=>{
    const file=e.target.files[0];if(!file)return;
    setUploading(true);
    const b64=await new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.readAsDataURL(file);});
    try{
      const resp=await fetch("/api/ai",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
        model:"claude-sonnet-4-5",max_tokens:2000,
        messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:file.type,data:b64}},
          {type:"text",text:"Extract vehicle workshop log rows. Return ONLY JSON array: [{\"no\":1,\"date\":\"29.05.2026\",\"plate\":\"BPW9983\",\"model\":\"CRV G5\",\"timeIn\":\"10:10\",\"timeStart\":\"10:10\",\"timeExpected\":\"12:10\",\"timeActual\":\"11:36\"}]. timeExpected=OUT column. timeActual=REAL column. Return ONLY the array."}
        ]}]
      })});
      const data=await resp.json();
      const text=(data.content||[]).map(c=>c.text||"").join("").trim();
      const s=text.indexOf("["),en=text.lastIndexOf("]");
      if(s===-1)throw new Error("Cannot parse");
      setAiResult(JSON.parse(text.slice(s,en+1)));
    }catch(err){alert("Failed: "+err.message);}
    setUploading(false);e.target.value="";
  };

  const previewOT=calcOT(form);

  return(
    <div>
      {/* Vehicle Detail Modal */}
      {detailVehicle&&(()=>{
        const v=detailVehicle;
        const ot=v.overtime||calcOT(v);
        const techs=(v.staffIds||[]).map(id=>allUsers.find(u=>u.id===id)).filter(Boolean);
        const sc=v.status||"PENDING";
        const scColor=sc==="GOOD"?"#2ECC71":sc==="OK"?"#F1C40F":sc==="LATE"?"#E74C3C":"#7A7F8E";
        return(
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:200,overflowY:"auto",padding:20}}>
            <div style={{...S.card(),padding:20,maxWidth:420,margin:"0 auto"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <div style={{color:B.text,fontWeight:800,fontSize:16}}>🚗 车辆详情</div>
                <button onClick={()=>setDetailVehicle(null)} style={{...S.btn(B.border,B.muted,{fontSize:12,padding:"5px 12px"})}}>✕ 关闭</button>
              </div>
              <div style={{...S.card(),padding:14,marginBottom:12,background:B.dark}}>
                <div style={{color:B.text,fontSize:22,fontWeight:900,marginBottom:4}}>{v.plate}</div>
                <div style={{color:B.muted,fontSize:14}}>{v.model}</div>
                <div style={{color:B.muted,fontSize:11,marginTop:4}}>{v.date} · No.{v.no}</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:9,marginBottom:12}}>
                {[{label:"进车时间",value:v.timeIn||"—"},{label:"开始维修",value:v.timeStart||"—"},{label:"预计出车",value:v.timeExpected||"—"},{label:"实际完成",value:v.timeActual||"—"}].map(item=>(
                  <div key={item.label} style={{...S.card(),padding:10,textAlign:"center"}}>
                    <div style={{color:B.muted,fontSize:9,marginBottom:3}}>{item.label}</div>
                    <div style={{color:B.text,fontSize:16,fontWeight:700,fontFamily:"monospace"}}>{item.value}</div>
                  </div>
                ))}
              </div>
              <div style={{...S.card(),padding:12,marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div>
                  <div style={{color:B.muted,fontSize:10,marginBottom:3}}>超时</div>
                  <div style={{color:ot?(ot.isOver?"#E74C3C":"#2ECC71"):B.muted,fontSize:16,fontWeight:700,fontFamily:"monospace"}}>
                    {ot?(ot.isOver?"+"+ot.overMin+"m":"-"+Math.abs(ot.overMin)+"m"):"—"}
                  </div>
                </div>
                <span style={{background:scColor+"22",color:scColor,borderRadius:6,padding:"4px 14px",fontSize:14,fontWeight:800}}>{sc}</span>

                      <Av src={tt.avatar} name={tt.name} dept={tt.dept} size={28}/>
                      <span style={{color:B.text,fontSize:12}}>{tt.name}</span>
                    </div>
                  ))}
                </div>
              </div>}
              {v.notes&&<div style={{...S.card(),padding:12,marginBottom:12}}>
                <div style={{color:B.muted,fontSize:10,marginBottom:6}}>维修内容</div>
                <div style={{color:B.text,fontSize:12,lineHeight:1.6}}>{v.notes}</div>
              </div>}
              <div style={{color:B.muted,fontSize:10,textAlign:"center",marginBottom:8}}>填写人: {v.createdByName||"—"}</div>
              {canEdit&&<button onClick={()=>{setForm({plate:v.plate,model:v.model,timeIn:v.timeIn||"",timeStart:v.timeStart||"",timeExpected:v.timeExpected||"",timeActual:v.timeActual||"",staffIds:v.staffIds||[],date:v.date});setEditId(v.id);setShowAdd(true);setDetailVehicle(null);}} style={{...S.btn(B.red,"#fff",{width:"100%",padding:11,fontSize:13})}}>✏️ 编辑此记录</button>}
            </div>
          </div>
        );
      })()}

      {/* Today's appointments quick-start */}
      {todayAppts.length>0&&<div style={{...S.card(),padding:12,marginBottom:12,border:`1px solid ${B.red}44`,background:"#1A0A00"}}>
        <div style={{color:B.red,fontWeight:700,fontSize:12,marginBottom:8}}>📅 今天预约 ({todayAppts.length}) — 一键开工</div>
        {todayAppts.map(a=>(
          <div key={a.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 0",borderBottom:`1px solid ${B.border}`}}>
            <div>
              <div style={{color:B.text,fontWeight:700,fontSize:13}}>{a.plate} <span style={{color:B.muted,fontWeight:400,fontSize:11}}>{a.model}</span></div>
              <div style={{color:B.muted,fontSize:10}}>{a.time} · {(a.services||[]).slice(0,2).join(", ")}{(a.services||[]).length>2?"...":""}</div>
            </div>
            <button onClick={()=>convertAppt(a)} style={{...S.btn(B.red,"#fff",{fontSize:11,padding:"6px 14px",whiteSpace:"nowrap"})}}>🚗 开工</button>
          </div>
        ))}
      </div>}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{color:B.text,fontSize:17,fontWeight:800}}>{t.vehicles_tracker}</div>
          <div style={{color:B.muted,fontSize:11}}>{t.vehicles_subtitle}</div>

      {/* FILTER BAR */}
      <div style={{...S.card(),padding:10,marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:showFilters?10:0}}>
          <button onClick={()=>setShowFilters(s=>!s)} style={{...S.btn(activeFilters>0?B.red:B.border,activeFilters>0?"#fff":B.muted,{fontSize:11,padding:"5px 12px",display:"flex",alignItems:"center",gap:5})}}>
            🔍 筛选 {activeFilters>0&&<span style={{background:"#fff",color:B.red,borderRadius:99,width:16,height:16,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:900}}>{activeFilters}</span>}
          </button>
          {activeFilters>0&&<button onClick={()=>{setFDate("all");setFModel("");setFStatus("all");setFCreator("all");}} style={{...S.btn("transparent","#E74C3C",{fontSize:10,padding:"4px 10px"})}}>✕ 清除</button>}
          <span style={{color:B.muted,fontSize:10,marginLeft:"auto"}}>显示 {filteredVehicles.length} / {vehicles.length} 条</span>
        </div>

        {showFilters&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {/* Date filter */}
          <div style={{gridColumn:"1/-1"}}>
            <div style={{color:B.muted,fontSize:9,marginBottom:4}}>📅 日期</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {[["all","全部"],["today","今天"],["week","本周"],["month","本月"],["custom","自定义"]].map(([v,l])=>(
                <button key={v} onClick={()=>setFDate(v)} style={{...S.btn(fDate===v?B.red:B.border,fDate===v?"#fff":B.muted,{fontSize:10,padding:"4px 10px"})}}>{l}</button>
              ))}
            </div>
            {fDate==="custom"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}}>
              <div><div style={{color:B.muted,fontSize:9,marginBottom:2}}>从</div><input type="date" value={fCustom.from} onChange={e=>setFCustom(c=>({...c,from:e.target.value}))} style={{...S.inp,fontSize:11}}/></div>
              <div><div style={{color:B.muted,fontSize:9,marginBottom:2}}>到</div><input type="date" value={fCustom.to} onChange={e=>setFCustom(c=>({...c,to:e.target.value}))} style={{...S.inp,fontSize:11}}/></div>
            </div>}
          </div>

          {/* Model/Plate search */}
          <div>
            <div style={{color:B.muted,fontSize:9,marginBottom:4}}>🚗 车款 / 车牌</div>
            <input value={fModel} onChange={e=>setFModel(e.target.value)} placeholder="搜索车款或车牌..." style={{...S.inp,fontSize:11}}/>
          </div>

          {/* Status filter */}
          <div>
            <div style={{color:B.muted,fontSize:9,marginBottom:4}}>📊 状态</div>
            <select value={fStatus} onChange={e=>setFStatus(e.target.value)} style={{...S.inp,fontSize:11}}>
              <option value="all">全部</option>
              <option value="GOOD">✅ GOOD</option>
              <option value="OK">🟡 OK</option>
              <option value="LATE">🔴 LATE</option>
              <option value="PENDING">⏳ PENDING</option>
            </select>
          </div>

          {/* Creator filter */}
          <div style={{gridColumn:"1/-1"}}>
            <div style={{color:B.muted,fontSize:9,marginBottom:4}}>👤 填写人</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              <button onClick={()=>setFCreator("all")} style={{...S.btn(fCreator==="all"?B.red:B.border,fCreator==="all"?"#fff":B.muted,{fontSize:10,padding:"4px 10px"})}}>全部</button>
              {uniqueCreators.map(c=>(
                <button key={c} onClick={()=>setFCreator(fCreator===c?"all":c)} style={{...S.btn(fCreator===c?B.red:B.border,fCreator===c?"#fff":B.muted,{fontSize:10,padding:"4px 10px"})}}>{c}</button>
              ))}
              {uniqueCreators.length===0&&<span style={{color:B.muted,fontSize:10}}>暂无记录</span>}
            </div>
          </div>
        </div>}
      </div>
      <input ref={fRef} type="file" accept="image/*" style={{display:"none"}} onChange={upload}/>

      {uploading&&<div style={{...S.card(),padding:14,marginBottom:12,textAlign:"center"}}><span style={{color:B.red,fontWeight:700}}>{t.aiReading}</span></div>}

      {aiResult&&<div style={{...S.card(),padding:16,marginBottom:12,border:"1px solid #F1C40F"}}>
        <div style={{color:"#F1C40F",fontWeight:800,marginBottom:9}}>{t.aiConfirm} {aiResult.length} {t.records}</div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
            <thead><tr>{["No",t.plate,t.model,t.checkIn,t.startRepair,t.expectedOut,t.actualOut].map(h=><th key={h} style={{color:B.muted,padding:"4px 8px",textAlign:"left",borderBottom:`1px solid ${B.border}`}}>{h}</th>)}</tr></thead>
            <tbody>{aiResult.map((r,i)=><tr key={i}>{[r.no,r.plate,r.model,r.timeIn,r.timeStart,r.timeExpected,r.timeActual].map((v,j)=><td key={j} style={{color:B.text,padding:"4px 8px",borderBottom:`1px solid ${B.border}`}}>{v||"–"}</td>)}</tr>)}</tbody>
          </table>
        </div>
        <div style={{display:"flex",gap:7,marginTop:10}}>
          <button onClick={()=>{
            const today=new Date().toLocaleDateString("en-GB").replace(/\//g,".");
            save([...vehicles,...aiResult.map((r,i)=>{const ot=calcOT(r);return{...r,id:Date.now()+i,date:r.date||today,overtime:ot,status:autoStatus(ot),staffIds:[],createdBy:user.id,createdByName:user.name};})]);
            setAiResult(null);
          }} style={{...S.btn(B.red)}}>{t.confirmImport}</button>
          <button onClick={()=>setAiResult(null)} style={{...S.btn(B.border,B.muted)}}>{t.cancel}</button>
        </div>
      </div>}

      {showAdd&&<div style={{...S.card(),padding:17,marginBottom:14,border:`1px solid ${B.red}`}}>
        <div style={{color:B.text,fontWeight:700,marginBottom:13,fontSize:14}}>{editId?t.editRecord:t.addRecord}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:9,marginBottom:11}}>
          {[[t.date,"date"],[t.plate,"plate"],[t.model,"model"],[t.checkIn,"timeIn"],[t.startRepair,"timeStart"],[t.expectedOut,"timeExpected"],[t.actualOut,"timeActual"]].map(([l,k])=>(
            <div key={k}><div style={{color:B.muted,fontSize:10,marginBottom:3}}>{l}</div>
              <input value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} placeholder={k.includes("time")?"HH:MM":""} style={S.inp}/>
            </div>
          ))}
        </div>

        <div style={{marginBottom:11}}>
          <div style={{color:B.muted,fontSize:10,marginBottom:6}}>{t.assignedTech} — {t.selected}: {(form.staffIds||[]).length}/4</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {staffList.map(s=>{
              const sel=(form.staffIds||[]).includes(s.id);
              const disabled=!sel&&(form.staffIds||[]).length>=4;
              return(
                <button key={s.id} onClick={()=>!disabled&&toggleStaff(s.id)}
                  style={{...S.btn(sel?DC[s.dept]||B.red:B.border,sel?"#fff":B.muted,{fontSize:11,padding:"5px 10px",opacity:disabled?0.4:1,cursor:disabled?"not-allowed":"pointer",display:"flex",alignItems:"center",gap:6})}}>
                  <Av src={s.avatar} name={s.name} dept={s.dept} size={20}/>{s.name}
                </button>
              );
            })}
          </div>
        </div>

        {previewOT&&<div style={{background:previewOT.isOver?"#2B0009":"#0D2B19",border:`1px solid ${previewOT.isOver?"#E74C3C":"#2ECC71"}`,borderRadius:9,padding:"8px 12px",marginBottom:11,fontSize:12}}>
          <span style={{color:previewOT.isOver?"#E74C3C":"#2ECC71",fontWeight:700}}>
            {previewOT.isOver?`${t.overtime}: ${previewOT.overMin}min (${previewOT.overPct}%)`:`${t.onTime} (saved ${Math.abs(previewOT.overMin)}min)`}
          </span>
          <span style={{color:B.muted,marginLeft:10}}>Planned {previewOT.planned}min / Actual {previewOT.actual}min</span>
          {previewOT.isOver&&(form.staffIds||[]).length>1&&<div style={{color:B.muted,fontSize:10,marginTop:3}}>
            {t.eachTechShare}: {(previewOT.overPct/(form.staffIds||[]).length).toFixed(1)}{t.overtimePct}
          </div>}
        </div>}

        <div style={{marginBottom:10}}>
          <div style={{color:B.muted,fontSize:10,marginBottom:4}}>维修内容 / 备注</div>

        </div>

        <div style={{display:"flex",gap:7}}>
          <button onClick={submitForm} style={{...S.btn(B.red)}}>{t.save}</button>
          <button onClick={()=>{setShowAdd(false);setEditId(null);setForm(emptyF);}} style={{...S.btn(B.border,B.muted)}}>{t.cancel}</button>
        </div>
      </div>}

      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,minWidth:800}}>
          <thead><tr style={{background:B.card2}}>{["No",t.date,t.plate,t.model,t.checkIn,t.startRepair,t.expectedOut,t.actualOut,t.overtime,t.status,t.technicians,"填写人",""].map(h=><th key={h} style={{color:B.muted,padding:"7px 9px",textAlign:"left",borderBottom:`1px solid ${B.border}`,fontWeight:700,fontSize:10,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
          <tbody>{filteredVehicles.map(r=>{
            const ot=r.overtime||calcOT(r);
            const techs=(r.staffIds||[]).map(id=>allUsers.find(u=>u.id===id)).filter(Boolean);
            const share=techs.length||1;
            const creator=r.createdByName||"—";
            return(
              <tr key={r.id} onClick={()=>setDetailVehicle(r)} style={{background:r.status==="LATE"?"#1A0808":B.dark,borderBottom:`1px solid ${B.border}`,cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background=B.card2} onMouseLeave={e=>e.currentTarget.style.background=r.status==="LATE"?"#1A0808":B.dark}>
                <td style={{padding:"7px 9px",color:B.muted,fontFamily:"monospace"}}>{r.no}</td>
                <td style={{padding:"7px 9px",color:B.muted,fontSize:10}}>{r.date}</td>
                <td style={{padding:"7px 9px",color:B.text,fontWeight:700}}>{r.plate}</td>
                <td style={{padding:"7px 9px",color:B.muted}}>{r.model}</td>
                {[r.timeIn,r.timeStart,r.timeExpected,r.timeActual].map((v,i)=><td key={i} style={{padding:"7px 9px",fontFamily:"monospace",color:B.text,fontSize:11}}>{v||"–"}</td>)}
                <td style={{padding:"7px 9px"}}>
                  {ot?<div>
                    <span style={{color:ot.isOver?B.red:"#2ECC71",fontFamily:"monospace",fontWeight:700,fontSize:10,display:"block"}}>{ot.isOver?`+${ot.overMin}m`:"-"+Math.abs(ot.overMin)+"m"}</span>
                    {ot.isOver&&<span style={{color:B.muted,fontSize:9}}>{(ot.overPct/share).toFixed(1)}%/tech</span>}
                  </div>:<span style={{color:B.muted}}>–</span>}
                </td>
                <td style={{padding:"7px 9px"}}><span style={{background:scColor(r.status)+"22",color:scColor(r.status),borderRadius:5,padding:"1px 6px",fontSize:10,fontWeight:700}}>{r.status}</span></td>
                <td style={{padding:"7px 9px"}}>
                  <div style={{display:"flex",gap:3}}>
                    {techs.map(s=><div key={s.id} title={s.name}><Av src={s.avatar} name={s.name} dept={s.dept} size={22}/></div>)}
                    {techs.length===0&&<span style={{color:B.muted,fontSize:10}}>–</span>}
                  </div>
                </td>
                <td style={{padding:"7px 9px",color:B.muted,fontSize:10,whiteSpace:"nowrap"}}>{creator}</td>
                {canEdit&&<td style={{padding:"7px 9px"}}>
                  <div style={{display:"flex",gap:3}}>
                    <button onClick={()=>{setForm({plate:r.plate,model:r.model,timeIn:r.timeIn||"",timeStart:r.timeStart||"",timeExpected:r.timeExpected||"",timeActual:r.timeActual||"",staffIds:r.staffIds||[],notes:r.notes||"",date:r.date});setEditId(r.id);setShowAdd(true);}} style={{...S.btn("#252830",B.muted,{padding:"3px 7px",fontSize:9})}}>{t.save}</button>
                    <button onClick={()=>{if(confirm(t.confirmDelete))save(vehicles.filter(v=>v.id!==r.id));}} style={{...S.btn("#2B0009","#E74C3C",{padding:"3px 7px",fontSize:9})}}>{t.delete}</button>
                  </div>
                </td>}
              </tr>
            );
          })}</tbody>
        </table>
        {filteredVehicles.length===0&&<div style={{textAlign:"center",padding:36,color:B.muted}}>{vehicles.length>0?"没有符合筛选条件的记录":t.noRecords}</div>}
      </div>
    </div>
  );
}

function calcMBTIResult(answers,questions){
  let scores={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  questions.forEach((q,i)=>{
    const a=answers[i];if(a===undefined)return;
    const val=(a-3)*q.dir; // -2 to +2, positive = first letter
    if(q.d==="EI"){if(val>0)scores.E+=Math.abs(val);else scores.I+=Math.abs(val);}
    else if(q.d==="SN"){if(val>0)scores.N+=Math.abs(val);else scores.S+=Math.abs(val);}
    else if(q.d==="TF"){if(val>0)scores.T+=Math.abs(val);else scores.F+=Math.abs(val);}
    else if(q.d==="JP"){if(val>0)scores.J+=Math.abs(val);else scores.P+=Math.abs(val);}
  });
  const type=(scores.E>=scores.I?"E":"I")+(scores.S>=scores.N?"S":"N")+(scores.T>=scores.F?"T":"F")+(scores.J>=scores.P?"J":"P");
  const pcts={
    EI:Math.round(scores.E/(scores.E+scores.I||1)*100),
    SN:Math.round(scores.N/(scores.S+scores.N||1)*100),
    TF:Math.round(scores.T/(scores.T+scores.F||1)*100),
    JP:Math.round(scores.J/(scores.J+scores.P||1)*100),
  };
  return{type,scores,pcts};
}

function MBTITest({emp,mode,isBoss,onClose,onSave}){
  const questions=mode==="full"?MBTI_Q_FULL:MBTI_Q_SHORT;
  const minRequired=mode==="full"?70:15;
  const [step,setStep]=useState(0);
  const [answers,setAnswers]=useState({});
  const [result,setResult]=useState(null);
  const startTime=useRef(Date.now());
  const answerTimes=useRef([]);

  const recordAnswer=(i,v)=>{
    const now=Date.now();
    answerTimes.current[i]={v,ms:now-(answerTimes.current[i-1]?.t||startTime.current),t:now};
    setAnswers(a=>({...a,[i]:v}));
    if(i<questions.length-1){
      setTimeout(()=>setStep(s=>Math.min(s+1,questions.length-1)),200);
    }
  };

  const submit=async()=>{
    const totalMs=Date.now()-startTime.current;
    const totalSec=Math.round(totalMs/1000);
    const mins=Math.floor(totalSec/60);
    const secs=totalSec%60;
    const timeStr=mins>0?`${mins}分${secs}秒`:`${secs}秒`;
    const{type,scores,pcts}=calcMBTIResult(answers,questions);
    setResult({type,scores,pcts,timeStr});
  };

  const save=()=>{
    const record={
      type:result.type,pcts:result.pcts,
      mode,date:new Date().toLocaleDateString("zh-CN"),
      time:new Date().toLocaleString(),
      duration:result.timeStr,
      sincere:result.aiVerdict?.sincere,
    };
    onSave(record);
    onClose();
  };

  const info=result?MBTI_DETAIL[result.type]:null;
  const answered=Object.keys(answers).length;
  const q=questions[Math.min(step,questions.length-1)]||{q:""};

  if(result&&info){
    return(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.96)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{...S.card(),padding:24,maxWidth:380,width:"100%",textAlign:"center",overflowY:"auto",maxHeight:"90vh"}}>
          <div style={{fontSize:56,marginBottom:10}}>{info.emoji}</div>
          <div style={{color:B.muted,fontSize:11,letterSpacing:3,marginBottom:4}}>你的MBTI人格是</div>
          <div style={{color:info.color||B.red,fontSize:36,fontWeight:900,letterSpacing:4,marginBottom:4}}>{result.type}</div>
          <div style={{color:B.text,fontSize:18,fontWeight:800,marginBottom:6}}>{info.name}</div>
          <div style={{color:B.muted,fontSize:12,lineHeight:1.6,marginBottom:12}}>{info.desc}</div>
          {/* Time */}
          <div style={{...S.card(),padding:"8px 14px",marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span style={{color:B.muted,fontSize:11}}>⏱️ 作答时间</span>
            <span style={{color:B.text,fontWeight:700,fontSize:12}}>{result.timeStr}</span>
          </div>
          {/* Mini bars */}
          <div style={{marginBottom:18}}>
            {[["E/I",result.pcts.EI,"E","I"],["N/S",result.pcts.SN,"N","S"],["T/F",result.pcts.TF,"T","F"],["J/P",result.pcts.JP,"J","P"]].map(([l,p,a,b])=>(
              <div key={l} style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                <span style={{color:B.muted,fontSize:9,width:28}}>{a} {p}%</span>
                <div style={{flex:1,background:B.border,borderRadius:99,height:6,overflow:"hidden"}}>
                  <div style={{width:p+"%",height:"100%",background:info.color||B.red,borderRadius:99}}/>
                </div>
                <span style={{color:B.muted,fontSize:9,width:28,textAlign:"right"}}>{100-p}% {b}</span>
              </div>
            ))}
          </div>
          <button onClick={save} style={{...S.btn(B.red,"#fff",{width:"100%",padding:12,fontSize:14,marginBottom:8})}}>💾 保存结果</button>
          <button onClick={()=>setResult(null)} style={{...S.btn(B.border,B.muted,{width:"100%",padding:10,fontSize:12})}}>重新测试</button>
        </div>
      </div>
    );
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.96)",zIndex:300,overflowY:"auto",padding:16}}>
      <div style={{...S.card(),padding:20,maxWidth:420,margin:"0 auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div>
            <div style={{color:B.text,fontWeight:800,fontSize:15}}>🧠 MBTI 人格测试</div>
            <div style={{color:B.muted,fontSize:10}}>{mode==="full"?"精准版 93题":"简约版 20题"}</div>
          </div>
          <button onClick={onClose} style={{...S.btn(B.border,B.muted,{fontSize:11,padding:"4px 10px"})}}>✕</button>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <span style={{color:B.muted,fontSize:10}}>{step+1} / {questions.length}</span>
            <span style={{color:B.muted,fontSize:10}}>已答 {answered}题</span>
          </div>
          <div style={{background:B.border,borderRadius:99,height:5,overflow:"hidden"}}>
            <div style={{width:`${((step+1)/questions.length)*100}%`,height:"100%",background:B.red,borderRadius:99,transition:"width .3s"}}/>
          </div>
        </div>
        <div style={{...S.card(),padding:16,marginBottom:16,minHeight:72,display:"flex",alignItems:"center"}}>
          <div style={{color:B.text,fontSize:14,lineHeight:1.7,textAlign:"center",width:"100%"}}>{q.q}</div>
        </div>
        <div style={{marginBottom:18}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <span style={{color:B.muted,fontSize:10}}>完全不同意</span>
            <span style={{color:B.muted,fontSize:10}}>完全同意</span>
          </div>
          <div style={{display:"flex",gap:6,justifyContent:"center"}}>
            {[1,2,3,4,5].map(v=>(
              <button key={v} onClick={()=>recordAnswer(step,v)}
                style={{width:56,height:56,borderRadius:10,border:`2px solid ${answers[step]===v?B.red:B.border}`,
                  background:answers[step]===v?`${B.red}33`:"transparent",
                  color:answers[step]===v?B.red:B.muted,fontSize:20,cursor:"pointer",transition:"all .15s",touchAction:"manipulation"}}>
                {v===1?"😤":v===2?"🙁":v===3?"😐":v===4?"🙂":"😄"}
              </button>
            ))}
          </div>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <button onClick={()=>step>0&&setStep(s=>s-1)} disabled={step===0}
            style={{...S.btn(B.border,B.muted,{flex:1,opacity:step===0?0.3:1})}}>← 上一题</button>
          {step<questions.length-1
            ?<button onClick={()=>setStep(s=>s+1)} style={{...S.btn(B.border,B.text,{flex:1})}}>下一题 →</button>
            :<button onClick={submit} disabled={answered<minRequired}
              style={{...S.btn(answered>=minRequired?B.red:B.border,answered>=minRequired?"#fff":B.muted,{flex:2,opacity:answered<minRequired?0.5:1})}}>
              {answered>=minRequired?"🧠 查看结果":`还需答 ${minRequired-answered} 题`}
            </button>
          }
        </div>
        <div style={{color:B.muted,fontSize:10,textAlign:"center"}}>至少答{minRequired}题才能查看结果</div>
      </div>
    </div>
  );
}


function ScoringPage({user,emp,bonusCfg,vehicles,onBack,onSave}){
  const {t,lang}=useLang();
  const cr=CRIT[emp.role];const dc=DC[emp.role];
  const ct=CRIT_T[lang]||CRIT_T.en;
  const tn=k=>ct.items[k]||k;
  const td=k=>ct.desc[k]||k;
  const ts=k=>ct.sec[k]||k;
  const tb=k=>ct.bonus[k]||k;
  const tbd=k=>ct.bonusDesc[k]||k;
  const canScore=user.role==="boss"||user.canScore||(user.canManage&&user.dept===emp.role)||(user.role==="manager"&&user.dept===emp.role);
  const empUserId=emp.userId||null;
  const init=()=>{
    const s={};
    cr.s.forEach(sec=>sec.i.forEach(it=>{
      if(it.auto&&empUserId){s[sec.n+"__"+it.n]=emp.scores?.[sec.n+"__"+it.n]??calcAutoScore(empUserId,vehicles,it.m);}
      else{s[sec.n+"__"+it.n]=emp.scores?.[sec.n+"__"+it.n]??0;}
    }));
    BONUS_ITEMS.forEach(b=>{s["B__"+b.n]=emp.scores?.["B__"+b.n]??0;});
    return s;
  };
  const [sc,setSc]=useState(init);
  const set=(k,v)=>setSc(s=>({...s,[k]:v}));
  const base=cr.s.reduce((a,sec)=>a+sec.i.reduce((b,it)=>b+(sc[sec.n+"__"+it.n]||0),0),0);
  const bon=Math.min(10,BONUS_ITEMS.reduce((a,b)=>a+(sc["B__"+b.n]||0),0));
  const total=base+bon;
  const mxBase=cr.s.reduce((a,sec)=>a+sec.i.reduce((b,it)=>b+it.m,0),0);
  const grade=getGrade(total,cr.t,bonusCfg);
  const [showMBTI,setShowMBTI]=useState(false);
  const [mbtiMode,setMbtiMode]=useState(null);
  const empMBTI=emp.mbti||null;
  const mbtiInfo=empMBTI?MBTI_DETAIL[empMBTI]:null;
  const isOwnProfile=user.name===emp.name||user.id===emp.userId;
  const canTakeMBTI=isOwnProfile||user.role==="boss";
  return(
    <div style={{minHeight:"100vh",background:B.dark}}>
      <div style={{background:"#0A0C10",borderBottom:`1px solid ${B.border}`,padding:"12px 16px",position:"sticky",top:0,zIndex:10}}>

          <button onClick={onBack} style={{...S.btn(B.border,B.muted,{padding:"6px 12px"})}}>{t.backBtn}</button>
          <Av src={emp.avatar} name={emp.name} dept={emp.role} size={34}/>
          <div style={{flex:1}}><div style={{color:B.muted,fontSize:10,letterSpacing:2}}>{emp.role} - {emp.quarter}</div><div style={{color:B.text,fontSize:15,fontWeight:800}}>{emp.name}</div></div>
          <div style={{textAlign:"right"}}><div style={{color:dc,fontSize:24,fontWeight:900,fontFamily:"'IBM Plex Mono',monospace"}}>{total}</div><div style={{color:B.muted,fontSize:10}}>/ {mxBase+10}</div></div>
        </div>
      </div>
      <div style={{maxWidth:680,margin:"0 auto",padding:"15px 14px"}}>
        <div style={{...S.card(),padding:"11px 15px",marginBottom:11,background:grade.color+"15",border:`1px solid ${grade.color}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{color:grade.color,fontWeight:800,fontSize:15}}>{grade.label}</div><div style={{color:B.muted,fontSize:10,marginTop:2}}>{t.threshold}: {cr.t}pts</div></div>
          <div style={{background:grade.color,color:"#fff",borderRadius:9,padding:"5px 13px",fontWeight:900,fontSize:14}}>RM {grade.amount}</div>
        </div>
        {!canScore&&<div style={{...S.card(),padding:9,marginBottom:11,textAlign:"center",color:B.muted,fontSize:11}}>{t.viewOnly}</div>}

        {/* MBTI Card */}
        {showMBTI&&mbtiMode&&<MBTITest emp={emp} mode={mbtiMode} isBoss={user.role==="boss"} onClose={()=>{setShowMBTI(false);setMbtiMode(null);}} onSave={(record)=>{onSave({...emp,total,scores:sc,grade:grade.label,bonusAmt:grade.amount,mbti:record.type,mbtiHistory:[record,...(emp.mbtiHistory||[])].slice(0,10)});}}/>}
        {showMBTI&&!mbtiMode&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>

            {["妻子","丈夫","父亲","母亲","兄弟","姐妹","朋友","其他"].map(r=><option key={r}>{r}</option>)}
          </select>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{...S.btn(B.border,B.muted,{flex:1})}}>取消</button>
          <button onClick={()=>onSave(form)} style={{...S.btn(B.red,"#fff",{flex:2})}}>💾 保存</button>
        </div>
      </div>
    </div>
  );
}

// ── STAFF PERFORMANCE ────────────────────────────────
function StaffPerformance({users,vehicles}){
  const today=new Date().toISOString().split("T")[0];
  const [range,setRange]=useState("month");
  const [custom,setCustom]=useState({from:today,to:today});
  const [selUser,setSelUser]=useState(null);

  const parseDate=d=>{
    if(!d)return null;
    if(d.includes("-"))return new Date(d);
    const[dd,mm,yyyy]=d.split(".");
    if(!yyyy)return null;
    return new Date(`${yyyy}-${mm.padStart(2,"0")}-${dd.padStart(2,"0")}`);
  };

  const getRangeDates=()=>{
    const now=new Date();
    if(range==="today"){const s=new Date(now);s.setHours(0,0,0,0);return{from:s,to:now};}
    if(range==="week"){const s=new Date(now);s.setDate(now.getDate()-7);return{from:s,to:now};}
    if(range==="month"){const s=new Date(now.getFullYear(),now.getMonth(),1);return{from:s,to:now};}
    if(range==="quarter"){const s=new Date(now.getFullYear(),Math.floor(now.getMonth()/3)*3,1);return{from:s,to:now};}
    return{from:new Date(custom.from),to:new Date(custom.to+"T23:59:59")};
  };

  const fmtMin=m=>{if(!m)return"0m";const h=Math.floor(m/60),mn=m%60;return h>0?`${h}h ${mn}m`:`${mn}m`;};

  const staffList=useMemo(()=>users.filter(u=>u.role!=="boss"),[users]);

  const calcStats=(uid)=>{
    const{from,to}=getRangeDates();
    const myV=vehicles.filter(v=>{
      if(!(v.staffIds||[]).includes(uid))return false;
      const d=parseDate(v.date);
      if(!d)return true;
      return d>=from&&d<=to;
    });
    let totalWorkMin=0,totalOTMin=0,onTime=0;
    myV.forEach(v=>{
      const ot=calcOT(v);
      if(ot){
        totalWorkMin+=ot.actual;
        const share=(v.staffIds||[]).length||1;
        if(ot.isOver)totalOTMin+=ot.overMin/share;
        else onTime++;
      }
    });
    const onTimeRate=myV.length>0?Math.round((onTime/myV.length)*100):100;
    return{total:myV.length,totalWorkMin:Math.round(totalWorkMin),totalOTMin:Math.round(totalOTMin),onTimeRate,vehicles:myV};
  };

  const allStats=useMemo(()=>staffList.map(u=>({...u,stats:calcStats(u.id)})),[staffList,vehicles,range,custom]);
  const sorted=useMemo(()=>[...allStats].sort((a,b)=>b.stats.total-a.stats.total),[allStats]);

  const selectedData=selUser?allStats.find(u=>u.id===selUser):null;

  return(
    <div>
      <div style={{color:B.text,fontSize:17,fontWeight:800,marginBottom:6}}>🏆 Staff Performance</div>
      <div style={{color:B.muted,fontSize:11,marginBottom:14}}>员工车辆表现排名</div>

      {/* Time filter */}
      <div style={{...S.card(),padding:12,marginBottom:14}}>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:range==="custom"?12:0}}>
          {[["today","今天"],["week","本周"],["month","本月"],["quarter","本季"],["custom","自定义"]].map(([v,l])=>(
            <button key={v} onClick={()=>setRange(v)} style={{...S.btn(range===v?B.red:B.border,range===v?"#fff":B.muted,{fontSize:11,padding:"5px 11px"})}}>{l}</button>
          ))}
        </div>
        {range==="custom"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:10}}>
          <div><div style={{color:B.muted,fontSize:10,marginBottom:3}}>从</div><input type="date" value={custom.from} onChange={e=>setCustom(c=>({...c,from:e.target.value}))} style={S.inp}/></div>
          <div><div style={{color:B.muted,fontSize:10,marginBottom:3}}>到</div><input type="date" value={custom.to} onChange={e=>setCustom(c=>({...c,to:e.target.value}))} style={S.inp}/></div>
        </div>}
      </div>

      {/* Ranking table */}
      <div style={{...S.card(),padding:14,marginBottom:14}}>
        <div style={{color:B.text,fontWeight:800,fontSize:13,marginBottom:12}}>排行榜</div>
        <div style={{display:"grid",gridTemplateColumns:"28px 1fr 48px 60px 60px 52px",gap:4,marginBottom:8}}>
          {["#","员工","车辆","工时","超时","准时率"].map(h=>(
            <div key={h} style={{color:B.muted,fontSize:9,fontWeight:700,letterSpacing:0.5}}>{h}</div>
          ))}
        </div>
        {sorted.map((u,i)=>{
          const s=u.stats;
          const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":"";
          const isSelected=selUser===u.id;
          return(
            <div key={u.id} onClick={()=>setSelUser(isSelected?null:u.id)}
              style={{display:"grid",gridTemplateColumns:"28px 1fr 48px 60px 60px 52px",gap:4,padding:"9px 6px",
                borderRadius:8,marginBottom:4,cursor:"pointer",
                background:isSelected?`${B.red}22`:i%2===0?B.card2:"transparent",
                border:`1px solid ${isSelected?B.red:"transparent"}`}}>
              <div style={{color:B.muted,fontSize:12,fontWeight:700}}>{medal||`${i+1}`}</div>
              <div>
                <div style={{color:B.text,fontSize:12,fontWeight:700}}>{u.name}</div>
                <div style={{color:B.muted,fontSize:9}}>{RL[u.role]}{u.dept?" · "+u.dept:""}</div>
              </div>
              <div style={{color:"#3498DB",fontSize:13,fontWeight:900,fontFamily:"monospace",textAlign:"center"}}>{s.total}</div>
              <div style={{color:"#9B59B6",fontSize:11,fontWeight:700,textAlign:"center"}}>{fmtMin(s.totalWorkMin)}</div>
              <div style={{color:s.totalOTMin>0?"#E74C3C":"#2ECC71",fontSize:11,fontWeight:700,textAlign:"center"}}>
                {s.totalOTMin>0?fmtMin(s.totalOTMin):"—"}
              </div>
              <div style={{color:s.onTimeRate>=90?"#2ECC71":s.onTimeRate>=70?"#F1C40F":"#E74C3C",fontSize:11,fontWeight:700,textAlign:"center"}}>
                {s.total>0?s.onTimeRate+"%":"—"}
              </div>
            </div>
          );
        })}
        {sorted.every(u=>u.stats.total===0)&&(
          <div style={{textAlign:"center",color:B.muted,fontSize:12,padding:20}}>此时间段内没有车辆记录</div>
        )}
      </div>

      {/* Individual detail - full stats */}
      {selectedData&&(()=>{
        const s=selectedData.stats;
        const avgOTPct=s.vehicles.length>0?(s.vehicles.reduce((acc,v)=>{const ot=calcOT(v);return acc+(ot&&ot.isOver?ot.overPct/((v.staffIds||[]).length||1):0);},0)/s.vehicles.length):0;
        const autoScore=Math.max(0,parseFloat((15-avgOTPct*0.15).toFixed(1)));
        const pct=Math.min(100,(autoScore/15)*100);
        return(
          <div style={{...S.card(),padding:14,border:`1px solid ${B.red}44`,marginBottom:14}}>
            {/* Header */}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
              <Av src={selectedData.avatar} name={selectedData.name} dept={selectedData.dept} size={44}/>
              <div style={{flex:1}}>
                <div style={{color:B.text,fontWeight:800,fontSize:16}}>{selectedData.name}</div>
                <div style={{color:B.muted,fontSize:11}}>{RL[selectedData.role]}{selectedData.dept?" · "+selectedData.dept:""}</div>
              </div>
              <button onClick={()=>setSelUser(null)} style={{...S.btn(B.border,B.muted,{fontSize:11,padding:"4px 10px"})}}>✕ 关闭</button>
            </div>

            {/* 4 stat cards */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:9,marginBottom:14}}>
              {[
                {label:"总维修车辆",value:s.total,color:"#3498DB"},
                {label:"总工作时间",value:s.totalWorkMin>0?fmtMin(s.totalWorkMin):"0m",color:"#9B59B6"},
                {label:"总超时时间",value:s.totalOTMin>0?fmtMin(s.totalOTMin):"无超时",color:s.totalOTMin>0?"#E74C3C":"#2ECC71"},
                {label:"准时率",value:s.total>0?s.onTimeRate+"%":"—",color:s.onTimeRate>=90?"#2ECC71":s.onTimeRate>=70?"#F1C40F":"#E74C3C"},
              ].map(item=>(
                <div key={item.label} style={{...S.card(),padding:14,textAlign:"center"}}>
                  <div style={{color:B.muted,fontSize:10,marginBottom:5}}>{item.label}</div>
                  <div style={{color:item.color,fontSize:21,fontWeight:900,fontFamily:"'IBM Plex Mono',monospace"}}>{item.value}</div>
                </div>
              ))}
            </div>

            {/* Auto KPI score */}
            <div style={{...S.card(),padding:16,marginBottom:14,border:`1px solid ${autoScore>=12?"#2ECC71":autoScore>=8?"#F1C40F":"#E74C3C"}44`}}>
              <div style={{color:B.text,fontWeight:800,marginBottom:10}}>按时交车率 — 自动KPI分数</div>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <div style={{textAlign:"center",minWidth:72}}>
                  <div style={{color:autoScore>=12?"#2ECC71":autoScore>=8?"#F1C40F":"#E74C3C",fontSize:34,fontWeight:900,fontFamily:"'IBM Plex Mono',monospace"}}>{autoScore}</div>
                  <div style={{color:B.muted,fontSize:10}}>/ 15 pts</div>
                </div>
                <div style={{flex:1}}>
                  <div style={{background:B.border,borderRadius:99,height:8,marginBottom:8,overflow:"hidden"}}>
                    <div style={{width:pct+"%",height:"100%",background:autoScore>=12?"#2ECC71":autoScore>=8?"#F1C40F":"#E74C3C",borderRadius:99,transition:"width .5s"}}/>
                  </div>
                  <div style={{color:B.muted,fontSize:10}}>平均超时: {avgOTPct.toFixed(1)}% · 扣分: {(15-autoScore).toFixed(1)}pts</div>
                  <div style={{color:B.muted,fontSize:10}}>满分15分，每超时1%（平均分担）扣0.15分</div>
                </div>
              </div>
            </div>

            {/* Vehicle records */}
            <div style={{color:B.text,fontWeight:700,fontSize:13,marginBottom:8}}>我参与的记录 ({s.vehicles.length})</div>
            {s.vehicles.length===0
              ?<div style={{color:B.muted,fontSize:11,textAlign:"center",padding:16}}>此时间段没有记录</div>
              :<div style={{...S.card(),padding:12}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 60px 60px 70px",gap:4,marginBottom:8}}>
                  {["车牌/车型","开始","完成","状态"].map(h=>(
                    <div key={h} style={{color:B.muted,fontSize:9,fontWeight:700}}>{h}</div>
                  ))}
                </div>
                {s.vehicles.slice(0,20).map((v,i)=>{
                  const ot=calcOT(v);
                  const statusColor=v.status==="GOOD"?"#2ECC71":v.status==="OK"?"#3498DB":v.status==="LATE"?"#E74C3C":"#F1C40F";
                  return(
                    <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 60px 60px 70px",gap:4,padding:"7px 0",borderBottom:`1px solid ${B.border}`}}>
                      <div>
                        <div style={{color:B.text,fontSize:11,fontWeight:700}}>{v.plate||"?"}</div>
                        <div style={{color:B.muted,fontSize:9}}>{v.model||""} {v.date||""}</div>
                      </div>
                      <div style={{color:B.muted,fontSize:10}}>{v.startRepair||"—"}</div>
                      <div style={{color:B.muted,fontSize:10}}>{v.actualDone||"—"}</div>
                      <div>
                        <div style={{color:statusColor,fontSize:10,fontWeight:700}}>{v.status||"—"}</div>
                        {ot&&ot.isOver&&<div style={{color:"#E74C3C",fontSize:9}}>+{Math.round(ot.overMin)}m</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            }
          </div>
        );
      })()}
    </div>
  );
}
