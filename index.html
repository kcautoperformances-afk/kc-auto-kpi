const api={
  load:()=>fetch("/api/data").then(r=>r.json()),
  save:(k,b)=>fetch("/api/"+k,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(b)}),
};
const toMin=t=>{if(!t||!t.includes(":"))return null;const[h,m]=t.split(":").map(Number);return h*60+m;};
const calcOT=r=>{
  const s=toMin(r.timeStart),e=toMin(r.timeExpected),a=toMin(r.timeActual);
  if(s===null||e===null||a===null)return null;
  const planned=e-s,actual=a-s;
  if(planned<=0)return null;
  const overMin=actual-planned;
  return{overMin,overPct:parseFloat(((overMin/planned)*100).toFixed(1)),planned,actual,isOver:overMin>0};
};
const autoStatus=ot=>{if(!ot)return"PENDING";if(!ot.isOver)return"GOOD";if(ot.overPct<=15)return"OK";return"LATE";};
const scColor=s=>s==="GOOD"?"#2ECC71":s==="OK"?"#F1C40F":s==="LATE"?"#E74C3C":"#7A7F8E";

const calcAutoScore=(staffId,vehicles,maxScore)=>{
  const mine=vehicles.filter(v=>(v.staffIds||[]).includes(staffId)&&v.timeStart&&v.timeExpected&&v.timeActual);
  if(!mine.length)return maxScore;
  let totalPct=0;
  mine.forEach(v=>{
    const ot=calcOT(v);
    if(ot&&ot.isOver){
      const share=(v.staffIds||[]).length||1;
      totalPct+=ot.overPct/share;
    }
  });
  const avgPct=totalPct/mine.length;
  return Math.max(0,parseFloat((maxScore-avgPct*0.15).toFixed(1)));
};

const getGrade=(score,threshold,bonusCfg)=>{
  const tiers=[...bonusCfg.tiers].sort((a,b)=>b.minScore-a.minScore);
  for(const t of tiers){if(score>=t.minScore)return t;}
  return{...tiers[tiers.length-1],amount:0};
};

function Av({src,name,size,dept}){
  size=size||36;
  const c=dept?DC[dept]:"#555";
  if(src)return React.createElement("img",{src,alt:name,style:{width:size,height:size,borderRadius:"50%",objectFit:"cover",border:`2px solid ${c}`,flexShrink:0}});
  const ini=(name||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  return React.createElement("div",{style:{width:size,height:size,borderRadius:"50%",background:`${c}22`,border:`2px solid ${c}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.34,fontWeight:800,color:c,flexShrink:0}},ini);
}

// ── SCORE INPUT ──────────────────────────────────────
function SI({value,max,onChange,locked}){
  const p=max>0?Math.min(value/max,1):0;
  const c=p>=0.8?"#2ECC71":p>=0.5?"#F1C40F":"#E74C3C";
  return(
    <div style={{display:"flex",alignItems:"center",gap:7}}>
      <input type="number" min={0} max={max} value={value} disabled={locked}
        onChange={e=>!locked&&onChange(Math.min(max,Math.max(0,Number(e.target.value))))}
        style={{...S.inp,width:54,padding:"5px",fontFamily:"'IBM Plex Mono',monospace",fontSize:14,fontWeight:700,textAlign:"center",border:`2px solid ${locked?B.border:c}`,background:locked?B.border:B.dark,color:locked?B.muted:c}}/>
      <div style={{flex:1,height:4,background:B.border,borderRadius:99,overflow:"hidden",minWidth:32}}>
        <div style={{width:`${p*100}%`,height:"100%",background:c,borderRadius:99}}/>
      </div>
      <span style={{fontSize:10,color:B.muted,minWidth:20,fontFamily:"monospace"}}>/{max}</span>
    </div>
  );
}

// ── ANONYMOUS FEEDBACK ───────────────────────────────
function FeedbackPage({user,feedbacks,setFeedbacks}){
  const {t}=useLang();
  const isBoss=user.role==="boss";
  const [msg,setMsg]=useState("");
  const [sent,setSent]=useState(false);

  const sendFeedback=()=>{
    if(!msg.trim()){alert(t.feedbackEmpty);return;}
    const newFb={id:Date.now(),msg:msg.trim(),time:new Date().toLocaleString(),read:false};
    const upd=[newFb,...feedbacks];
    setFeedbacks(upd);
    api.save("feedbacks",upd);
    setMsg("");
    setSent(true);
    setTimeout(()=>setSent(false),3000);
  };

  const deleteFb=id=>{
    const upd=feedbacks.filter(f=>f.id!==id);
    setFeedbacks(upd);
    api.save("feedbacks",upd);
  };

  const markRead=()=>{
    const upd=feedbacks.map(f=>({...f,read:true}));
    setFeedbacks(upd);
    api.save("feedbacks",upd);
  };

  if(isBoss){
    const unread=feedbacks.filter(f=>!f.read).length;
    return(
      <div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div>
            <div style={{color:B.text,fontSize:17,fontWeight:800}}>{t.feedbackInbox}</div>
            <div style={{color:B.muted,fontSize:11}}>{feedbacks.length} {t.feedbackCount}</div>
          </div>
          {unread>0&&<button onClick={markRead} style={{...S.btn(B.border,B.muted,{fontSize:11})}}>Mark all read</button>}
        </div>
        {feedbacks.length===0
          ?<div style={{...S.card(),padding:40,textAlign:"center",color:B.muted}}>{t.feedbackNone} 💬</div>
          :feedbacks.map(f=>(
            <div key={f.id} style={{...S.card(),padding:14,marginBottom:9,border:`1px solid ${f.read?B.border:"#D0021B44"}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:7}}>
                <div style={{display:"flex",alignItems:"center",gap:7}}>
                  <div style={{fontSize:18}}>💬</div>
                  {!f.read&&<span style={{background:"#D0021B",color:"#fff",borderRadius:4,padding:"1px 6px",fontSize:9,fontWeight:700}}>{t.feedbackNew}</span>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:7}}>
                  <span style={{color:B.muted,fontSize:10}}>{f.time}</span>
                  <button onClick={()=>deleteFb(f.id)} style={{...S.btn("#2B0009","#E74C3C",{fontSize:10,padding:"3px 8px"})}}>{t.feedbackDelete}</button>
                </div>
              </div>
              <div style={{color:B.text,fontSize:13,lineHeight:1.6,background:B.dark,borderRadius:9,padding:"10px 13px"}}>{f.msg}</div>
            </div>
          ))
        }
      </div>
    );
  }

  return(
    <div>
      <div style={{...S.card(),padding:20,marginBottom:14,textAlign:"center",background:"linear-gradient(135deg,#0A0C10,#16191F)"}}>
        <div style={{fontSize:36,marginBottom:8}}>💬</div>

        <div style={{color:B.muted,fontSize:12}}>{t.feedbackSubtitle}</div>

      <div style={{...S.card(),padding:16}}>
        <textarea
          value={msg}
          onChange={e=>setMsg(e.target.value)}
          placeholder={t.feedbackPlaceholder}
          rows={5}
          style={{...S.inp,resize:"vertical",lineHeight:1.6,marginBottom:12}}
        />

        }
      </div>
    </div>
  );
}

// ── PERSONAL STATS ───────────────────────────────────
function PersonalStats({user,vehicles}){
  const {t}=useLang();
  const today=new Date().toISOString().split("T")[0];
  const [range,setRange]=useState("month");
  const [custom,setCustom]=useState({from:today,to:today});

  const parseDate=d=>{
    if(!d)return null;
    if(d.includes("-"))return new Date(d);
    const[dd,mm,yyyy]=d.split(".");
    if(!yyyy)return null;
    return new Date(`${yyyy}-${mm.padStart(2,"0")}-${dd.padStart(2,"0")}`);
  };

  const getRangeDates=()=>{
    const now=new Date();
    if(range==="today"){const s=new Date(now);s.setHours(0,0,0,0);return{from:s,to:now};}
    if(range==="week"){const s=new Date(now);s.setDate(now.getDate()-7);return{from:s,to:now};}
    if(range==="month"){const s=new Date(now.getFullYear(),now.getMonth(),1);return{from:s,to:now};}
    return{from:new Date(custom.from),to:new Date(custom.to+"T23:59:59")};
  };

  const myVehicles=useMemo(()=>{
    const{from,to}=getRangeDates();
    return vehicles.filter(v=>{
      if(!(v.staffIds||[]).includes(user.id))return false;
      const d=parseDate(v.date);
      if(!d)return true;
      return d>=from&&d<=to;
    });
  },[vehicles,range,custom,user.id]);

  const stats=useMemo(()=>{
    let totalWorkMin=0,totalOTMin=0,totalOTPct=0,onTime=0;
    myVehicles.forEach(v=>{
      const ot=calcOT(v);
      if(ot){
        totalWorkMin+=ot.actual;
        const share=(v.staffIds||[]).length||1;
        if(ot.isOver){totalOTMin+=ot.overMin/share;totalOTPct+=ot.overPct/share;}
        else onTime++;
      }
    });
    const avgOTPct=myVehicles.length>0?totalOTPct/myVehicles.length:0;
    const autoScore=Math.max(0,parseFloat((15-avgOTPct*0.15).toFixed(1)));
    const onTimeRate=myVehicles.length>0?Math.round((onTime/myVehicles.length)*100):100;
    return{total:myVehicles.length,totalWorkMin:Math.round(totalWorkMin),totalOTMin:Math.round(totalOTMin),avgOTPct:avgOTPct.toFixed(1),autoScore,onTimeRate};
  },[myVehicles]);

  const fmtMin=m=>{const h=Math.floor(m/60),mn=m%60;return h>0?`${h}h ${mn}m`:`${mn}m`;};

  return(
    <div>
      <div style={{color:B.text,fontSize:17,fontWeight:800,marginBottom:14}}>{t.myEfficiency}</div>
      <div style={{...S.card(),padding:13,marginBottom:14}}>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:range==="custom"?12:0}}>
          {[["today",t.today],["week",t.thisWeek],["month",t.thisMonth],["custom",t.custom]].map(([v,l])=>(
            <button key={v} onClick={()=>setRange(v)} style={{...S.btn(range===v?B.red:B.border,range===v?"#fff":B.muted,{fontSize:11,padding:"5px 11px"})}}>{l}</button>
          ))}
        </div>
        {range==="custom"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:10}}>
          <div><div style={{color:B.muted,fontSize:10,marginBottom:3}}>{t.from}</div><input type="date" value={custom.from} onChange={e=>setCustom(c=>({...c,from:e.target.value}))} style={S.inp}/></div>
          <div><div style={{color:B.muted,fontSize:10,marginBottom:3}}>{t.to}</div><input type="date" value={custom.to} onChange={e=>setCustom(c=>({...c,to:e.target.value}))} style={S.inp}/></div>
        </div>}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:9,marginBottom:14}}>
        {[
          {label:t.totalVehicles,value:stats.total,color:"#3498DB"},
          {label:t.totalWorkTime,value:stats.totalWorkMin>0?fmtMin(stats.totalWorkMin):"0m",color:"#9B59B6"},
          {label:t.totalOvertime,value:stats.totalOTMin>0?fmtMin(stats.totalOTMin):t.noOvertime,color:stats.totalOTMin>0?"#E74C3C":"#2ECC71"},
          {label:t.onTimeRate,value:stats.onTimeRate+"%",color:stats.onTimeRate>=90?"#2ECC71":stats.onTimeRate>=70?"#F1C40F":"#E74C3C"},
        ].map(s=>(
          <div key={s.label} style={{...S.card(),padding:14,textAlign:"center"}}>
            <div style={{color:B.muted,fontSize:10,marginBottom:5}}>{s.label}</div>
            <div style={{color:s.color,fontSize:21,fontWeight:900,fontFamily:"'IBM Plex Mono',monospace"}}>{s.value}</div>
          </div>
        ))}
      </div>

      <div style={{...S.card(),padding:16,marginBottom:14,border:`1px solid ${stats.autoScore>=12?"#2ECC71":stats.autoScore>=8?"#F1C40F":"#E74C3C"}44`}}>
        <div style={{color:B.text,fontWeight:800,marginBottom:10}}>{t.autoKpiTitle}</div>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{textAlign:"center",minWidth:72}}>
            <div style={{color:stats.autoScore>=12?"#2ECC71":stats.autoScore>=8?"#F1C40F":"#E74C3C",fontSize:34,fontWeight:900,fontFamily:"'IBM Plex Mono',monospace"}}>{stats.autoScore}</div>
            <div style={{color:B.muted,fontSize:10}}>/ 15 pts</div>
          </div>
          <div style={{flex:1}}>
            <div style={{height:8,background:B.border,borderRadius:99,overflow:"hidden",marginBottom:7}}>
              <div style={{width:`${(stats.autoScore/15)*100}%`,height:"100%",background:stats.autoScore>=12?"#2ECC71":stats.autoScore>=8?"#F1C40F":"#E74C3C",borderRadius:99}}/>
            </div>
            <div style={{color:B.muted,fontSize:11}}>{t.avgOvertime}: {stats.avgOTPct}% · {t.deduction}: {(parseFloat(stats.avgOTPct)*0.15).toFixed(1)}pts</div>
            <div style={{color:B.muted,fontSize:10,marginTop:3}}>{t.autoFormula}</div>
          </div>
        </div>
      </div>

      <div style={{...S.card(),overflow:"hidden"}}>
        <div style={{background:B.card2,padding:"9px 14px",borderBottom:`1px solid ${B.border}`}}>
          <span style={{color:B.text,fontWeight:700,fontSize:12}}>{t.myVehicleRecords} ({myVehicles.length})</span>
        </div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,minWidth:480}}>
            <thead><tr>{[t.date,t.plate,t.model,t.startRepair,t.actualOut,t.overtime,t.status].map(h=><th key={h} style={{color:B.muted,padding:"6px 9px",textAlign:"left",borderBottom:`1px solid ${B.border}`,fontWeight:700,fontSize:10}}>{h}</th>)}</tr></thead>
            <tbody>{myVehicles.length===0?<tr><td colSpan={7} style={{padding:28,textAlign:"center",color:B.muted}}>{t.noPeriod}</td></tr>:myVehicles.map(v=>{
              const ot=v.overtime||calcOT(v);
              const share=(v.staffIds||[]).length||1;
              return<tr key={v.id} style={{borderBottom:`1px solid ${B.border}`,background:v.status==="LATE"?"#1A0808":B.dark}}>
                <td style={{padding:"6px 9px",color:B.muted}}>{v.date}</td>
                <td style={{padding:"6px 9px",color:B.text,fontWeight:700}}>{v.plate}</td>
                <td style={{padding:"6px 9px",color:B.muted}}>{v.model}</td>
                <td style={{padding:"6px 9px",fontFamily:"monospace"}}>{v.timeStart||"–"}</td>
                <td style={{padding:"6px 9px",fontFamily:"monospace"}}>{v.timeActual||"–"}</td>
                <td style={{padding:"6px 9px",fontFamily:"monospace",color:ot&&ot.isOver?B.red:"#2ECC71",fontWeight:700}}>
                  {ot?(ot.isOver?`+${ot.overMin}m (${(ot.overPct/share).toFixed(1)}% share)`:"-"+Math.abs(ot.overMin)+"m"):"–"}
                </td>
                <td style={{padding:"6px 9px"}}><span style={{background:scColor(v.status)+"22",color:scColor(v.status),borderRadius:4,padding:"1px 6px",fontWeight:700}}>{v.status||"–"}</span></td>
              </tr>;
            })}</tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── VEHICLE TRACKER ──────────────────────────────────

  const [showAdd,setShowAdd]=useState(false);
  const [editId,setEditId]=useState(null);
  const [form,setForm]=useState(emptyF);
  const [uploading,setUploading]=useState(false);
  const [aiResult,setAiResult]=useState(null);
  const fRef=useRef();
  const canEdit=user.role==="boss"||user.role==="manager"||user.canManage;
  const save=v=>{setVehicles(v);api.save("vehicles",v);};

  const toggleStaff=id=>{
    setForm(f=>{
      const ids=f.staffIds||[];
      if(ids.includes(id))return{...f,staffIds:ids.filter(x=>x!==id)};
      if(ids.length>=4)return f;
      return{...f,staffIds:[...ids,id]};
    });
  };

  const submitForm=()=>{
    const ot=calcOT(form);const status=autoStatus(ot);
    if(editId){save(vehicles.map(v=>v.id===editId?{...v,...form,overtime:ot,status}:v));setEditId(null);}
    else{save([...vehicles,{...form,id:Date.now(),no:vehicles.length+1,overtime:ot,status}]);}
    setForm(emptyF);setShowAdd(false);
  };

  const upload=async e=>{
    const file=e.target.files[0];if(!file)return;
    setUploading(true);
    const b64=await new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.readAsDataURL(file);});
    try{
      const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
        model:"claude-sonnet-4-20250514",max_tokens:2000,
        messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:file.type,data:b64}},
          {type:"text",text:"Extract vehicle workshop log rows. Return ONLY JSON array: [{\"no\":1,\"date\":\"29.05.2026\",\"plate\":\"BPW9983\",\"model\":\"CRV G5\",\"timeIn\":\"10:10\",\"timeStart\":\"10:10\",\"timeExpected\":\"12:10\",\"timeActual\":\"11:36\"}]. timeExpected=OUT column. timeActual=REAL column. Return ONLY the array."}
        ]}]
      })});
      const data=await resp.json();
      const text=(data.content||[]).map(c=>c.text||"").join("").trim();
      const s=text.indexOf("["),en=text.lastIndexOf("]");
      if(s===-1)throw new Error("Cannot parse");
      setAiResult(JSON.parse(text.slice(s,en+1)));

    setUploading(false);e.target.value="";

        </div>
        {canEdit&&<div style={{display:"flex",gap:7}}>
          <button onClick={()=>fRef.current.click()} style={{...S.btn(B.border,B.text,{fontSize:11})}}>{t.uploadSheet}</button>
          <button onClick={()=>{setShowAdd(true);setEditId(null);setForm(emptyF);}} style={{...S.btn(B.red,"#fff",{fontSize:11})}}>{t.addRecordBtn}</button>
        </div>}
      </div>
      <input ref={fRef} type="file" accept="image/*" style={{display:"none"}} onChange={upload}/>

      {uploading&&<div style={{...S.card(),padding:14,marginBottom:12,textAlign:"center"}}><span style={{color:B.red,fontWeight:700}}>{t.aiReading}</span></div>}

      {aiResult&&<div style={{...S.card(),padding:16,marginBottom:12,border:"1px solid #F1C40F"}}>
        <div style={{color:"#F1C40F",fontWeight:800,marginBottom:9}}>{t.aiConfirm} {aiResult.length} {t.records}</div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
            <thead><tr>{["No",t.plate,t.model,t.checkIn,t.startRepair,t.expectedOut,t.actualOut].map(h=><th key={h} style={{color:B.muted,padding:"4px 8px",textAlign:"left",borderBottom:`1px solid ${B.border}`}}>{h}</th>)}</tr></thead>
            <tbody>{aiResult.map((r,i)=><tr key={i}>{[r.no,r.plate,r.model,r.timeIn,r.timeStart,r.timeExpected,r.timeActual].map((v,j)=><td key={j} style={{color:B.text,padding:"4px 8px",borderBottom:`1px solid ${B.border}`}}>{v||"–"}</td>)}</tr>)}</tbody>
          </table>
        </div>
        <div style={{display:"flex",gap:7,marginTop:10}}>
          <button onClick={()=>{
            const today=new Date().toLocaleDateString("en-GB").replace(/\//g,".");
            save([...vehicles,...aiResult.map((r,i)=>{const ot=calcOT(r);return{...r,id:Date.now()+i,date:r.date||today,overtime:ot,status:autoStatus(ot),staffIds:[]};})]);
            setAiResult(null);

          <button onClick={()=>setAiResult(null)} style={{...S.btn(B.border,B.muted)}}>{t.cancel}</button>
        </div>
      </div>}

      {showAdd&&<div style={{...S.card(),padding:17,marginBottom:14,border:`1px solid ${B.red}`}}>
        <div style={{color:B.text,fontWeight:700,marginBottom:13,fontSize:14}}>{editId?t.editRecord:t.addRecord}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:9,marginBottom:11}}>

        <div style={{marginBottom:11}}>

                </button>
              );
            })}

        </div>

        {previewOT&&<div style={{background:previewOT.isOver?"#2B0009":"#0D2B19",border:`1px solid ${previewOT.isOver?"#E74C3C":"#2ECC71"}`,borderRadius:9,padding:"8px 12px",marginBottom:11,fontSize:12}}>
          <span style={{color:previewOT.isOver?"#E74C3C":"#2ECC71",fontWeight:700}}>
            {previewOT.isOver?`${t.overtime}: ${previewOT.overMin}min (${previewOT.overPct}%)`:`${t.onTime} (saved ${Math.abs(previewOT.overMin)}min)`}
          </span>
          <span style={{color:B.muted,marginLeft:10}}>Planned {previewOT.planned}min / Actual {previewOT.actual}min</span>
          {previewOT.isOver&&(form.staffIds||[]).length>1&&<div style={{color:B.muted,fontSize:10,marginTop:3}}>

          </div>}

        <div style={{display:"flex",gap:7}}>
          <button onClick={submitForm} style={{...S.btn(B.red)}}>{t.save}</button>
          <button onClick={()=>{setShowAdd(false);setEditId(null);setForm(emptyF);}} style={{...S.btn(B.border,B.muted)}}>{t.cancel}</button>
        </div>
      </div>}

      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,minWidth:800}}>
          <thead><tr style={{background:B.card2}}>{["No",t.date,t.plate,t.model,t.checkIn,t.startRepair,t.expectedOut,t.actualOut,t.overtime,t.status,t.technicians,""].map(h=><th key={h} style={{color:B.muted,padding:"7px 9px",textAlign:"left",borderBottom:`1px solid ${B.border}`,fontWeight:700,fontSize:10,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>

                <td style={{padding:"7px 9px"}}>

                {canEdit&&<td style={{padding:"7px 9px"}}>
                  <div style={{display:"flex",gap:3}}>
                    <button onClick={()=>{setForm({plate:r.plate,model:r.model,timeIn:r.timeIn||"",timeStart:r.timeStart||"",timeExpected:r.timeExpected||"",timeActual:r.timeActual||"",staffIds:r.staffIds||[],date:r.date});setEditId(r.id);setShowAdd(true);}} style={{...S.btn("#252830",B.muted,{padding:"3px 7px",fontSize:9})}}>{t.save}</button>
                    <button onClick={()=>{if(confirm(t.confirmDelete))save(vehicles.filter(v=>v.id!==r.id));}} style={{...S.btn("#2B0009","#E74C3C",{padding:"3px 7px",fontSize:9})}}>{t.delete}</button>
                  </div>
                </td>}
              </tr>
            );
          })}</tbody>
        </table>
        {vehicles.length===0&&<div style={{textAlign:"center",padding:36,color:B.muted}}>{t.noRecords}</div>}
      </div>
    </div>
  );
}

// ── SCORING PAGE ─────────────────────────────────────
function ScoringPage({user,emp,bonusCfg,vehicles,onBack,onSave}){
  const {t,lang}=useLang();
  const cr=CRIT[emp.role];const dc=DC[emp.role];
  const ct=CRIT_T[lang]||CRIT_T.en;
  const tn=k=>ct.items[k]||k;
  const td=k=>ct.desc[k]||k;
  const ts=k=>ct.sec[k]||k;
  const tb=k=>ct.bonus[k]||k;
  const tbd=k=>ct.bonusDesc[k]||k;
  const canScore=user.role==="boss"||(user.canManage&&user.dept===emp.role)||(user.role==="manager"&&user.dept===emp.role);
  const empUserId=emp.userId||null;
  const init=()=>{
    const s={};
    cr.s.forEach(sec=>sec.i.forEach(it=>{
      if(it.auto&&empUserId){s[sec.n+"__"+it.n]=emp.scores?.[sec.n+"__"+it.n]??calcAutoScore(empUserId,vehicles,it.m);}
      else{s[sec.n+"__"+it.n]=emp.scores?.[sec.n+"__"+it.n]??0;}
    }));
    BONUS_ITEMS.forEach(b=>{s["B__"+b.n]=emp.scores?.["B__"+b.n]??0;});
    return s;
  };
  const [sc,setSc]=useState(init);
  const set=(k,v)=>setSc(s=>({...s,[k]:v}));
  const base=cr.s.reduce((a,sec)=>a+sec.i.reduce((b,it)=>b+(sc[sec.n+"__"+it.n]||0),0),0);
  const bon=Math.min(10,BONUS_ITEMS.reduce((a,b)=>a+(sc["B__"+b.n]||0),0));
  const total=base+bon;
  const mxBase=cr.s.reduce((a,sec)=>a+sec.i.reduce((b,it)=>b+it.m,0),0);
  const grade=getGrade(total,cr.t,bonusCfg);
  return(
    <div style={{minHeight:"100vh",background:B.dark}}>
      <div style={{background:"#0A0C10",borderBottom:`1px solid ${B.border}`,padding:"12px 16px",position:"sticky",top:0,zIndex:10}}>
        <div style={{maxWidth:680,margin:"0 auto",display:"flex",alignItems:"center",gap:11}}>
          <button onClick={onBack} style={{...S.btn(B.border,B.muted,{padding:"6px 12px"})}}>{t.backBtn}</button>
          <Av src={emp.avatar} name={emp.name} dept={emp.role} size={34}/>
          <div style={{flex:1}}><div style={{color:B.muted,fontSize:10,letterSpacing:2}}>{emp.role} - {emp.quarter}</div><div style={{color:B.text,fontSize:15,fontWeight:800}}>{emp.name}</div></div>
          <div style={{textAlign:"right"}}><div style={{color:dc,fontSize:24,fontWeight:900,fontFamily:"'IBM Plex Mono',monospace"}}>{total}</div><div style={{color:B.muted,fontSize:10}}>/ {mxBase+10}</div></div>
        </div>
      </div>
      <div style={{maxWidth:680,margin:"0 auto",padding:"15px 14px"}}>
        <div style={{...S.card(),padding:"11px 15px",marginBottom:11,background:grade.color+"15",border:`1px solid ${grade.color}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{color:grade.color,fontWeight:800,fontSize:15}}>{grade.label}</div><div style={{color:B.muted,fontSize:10,marginTop:2}}>{t.threshold}: {cr.t}pts</div></div>
          <div style={{background:grade.color,color:"#fff",borderRadius:9,padding:"5px 13px",fontWeight:900,fontSize:14}}>RM {grade.amount}</div>
        </div>
        {!canScore&&<div style={{...S.card(),padding:9,marginBottom:11,textAlign:"center",color:B.muted,fontSize:11}}>{t.viewOnly}</div>}
        {cr.s.map(sec=>(
          <div key={sec.n} style={{...S.card(),marginBottom:9,overflow:"hidden"}}>
            <div style={{background:sec.c,padding:"7px 13px"}}><span style={{color:"#fff",fontWeight:700,fontSize:11}}>{ts(sec.n)}</span></div>
            {sec.i.map(it=>(
              <div key={it.n} style={{padding:"9px 13px",borderBottom:`1px solid ${B.border}`,display:"flex",alignItems:"center",gap:9}}>
                <div style={{flex:1}}>
                  <div style={{color:B.text,fontWeight:700,fontSize:12}}>
                    {tn(it.n)}
                    {it.auto&&<span style={{background:"#D0021B22",color:B.red,fontSize:9,marginLeft:6,borderRadius:4,padding:"1px 5px"}}>{t.autoLabel}</span>}
                  </div>
                  <div style={{color:B.muted,fontSize:10,marginTop:1}}>{td(it.d)}</div>
                </div>
                <SI value={sc[sec.n+"__"+it.n]||0} max={it.m} onChange={v=>set(sec.n+"__"+it.n,v)} locked={!canScore}/>
              </div>
            ))}
          </div>
        ))}
        <div style={{...S.card(),marginBottom:13,overflow:"hidden"}}>
          <div style={{background:"#7D5A00",padding:"7px 13px",display:"flex",justifyContent:"space-between"}}>
            <span style={{color:"#FFD700",fontWeight:700,fontSize:11}}>{t.bonusItems}</span>
            <span style={{color:"#FFD700",fontWeight:800}}>+{bon}</span>
          </div>
          {BONUS_ITEMS.map(b=>(
            <div key={b.n} style={{padding:"9px 13px",borderBottom:`1px solid ${B.border}`,display:"flex",alignItems:"center",gap:9}}>
              <div style={{flex:1}}><div style={{color:B.text,fontWeight:700,fontSize:12}}>{tb(b.n)}</div><div style={{color:B.muted,fontSize:10}}>{tbd(b.d)}</div></div>
              <SI value={sc["B__"+b.n]||0} max={b.m} onChange={v=>set("B__"+b.n,v)} locked={!canScore}/>
            </div>
          ))}
        </div>
        {canScore&&<button onClick={()=>onSave({...emp,scores:sc,total,grade:grade.label,bonusAmt:grade.amount})} style={{...S.btn(B.red,"#fff",{width:"100%",padding:12,fontSize:13,boxShadow:`0 4px 18px ${B.red}44`})}}>{t.saveScore}</button>}
      </div>
    </div>
  );
}

        </div>

              <button onClick={()=>setCfg(c=>({...c,tiers:c.tiers.filter((_,j)=>j!==i)}))} style={{...S.btn("#2B0009","#E74C3C",{padding:"5px"})}}>X</button>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:7}}>
              <span style={{color:B.muted,fontSize:10}}>Color:</span>
              <input type="color" value={tier.color} onChange={e=>setT(i,"color",e.target.value)} style={{width:28,height:24,border:"none",background:"none",cursor:"pointer"}}/>
              <div style={{background:tier.color,color:"#fff",borderRadius:4,padding:"1px 8px",fontSize:11,fontWeight:700}}>{tier.label}</div>

  );
}

            {logoUrl&&<button onClick={()=>{setLogoUrl(null);api.save("logo",{logoUrl:null});}} style={{...S.btn(B.border,B.muted,{fontSize:11})}}>{t.remove}</button>}

                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:9}}>
                    <div><div style={{color:B.muted,fontSize:9,marginBottom:2}}>{t.name}</div><input value={ev.name} onChange={e=>setEv(v=>({...v,name:e.target.value}))} style={S.inp}/></div>
                    <div><div style={{color:B.muted,fontSize:9,marginBottom:2}}>{t.pin}</div><input value={ev.pin} maxLength={4} onChange={e=>setEv(v=>({...v,pin:e.target.value.replace(/\D/g,"").slice(0,4)}))} style={{...S.inp,fontFamily:"monospace"}}/></div>

                  <div style={{display:"flex",gap:7}}>

                  <div style={{flex:1}}><div style={{color:B.text,fontWeight:700,fontSize:13}}>{u.name}</div><div style={{color:B.muted,fontSize:10,marginTop:1}}>{RL[u.role]}{u.dept?" - "+u.dept:""}{u.canManage?" (can manage)":""}</div></div>

          ))}

      </div>}
    </div>

}

// ── DASHBOARD ────────────────────────────────────────

              <button key={tabKey} onClick={()=>setTab(tabKey)} style={{...S.btn(tab===tabKey?B.red:"transparent",tab===tabKey?"#fff":B.muted,{fontSize:11,padding:"5px 10px",position:"relative"})}}>
                {l}

          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:7,marginBottom:13}}>
            {[[t.staff,vis.length,B.muted],[t.scored,scored.length,"#3498DB"],[t.pass,scored.filter(e=>e.total>=CRIT[e.role].t).length,"#2ECC71"],[t.excellent,scored.filter(e=>e.total>=90).length,"#F1C40F"]].map(([l,v,c])=>(
              <div key={l} style={{...S.card(),padding:"11px 7px",textAlign:"center"}}>
                <div style={{color:c,fontSize:19,fontWeight:900,fontFamily:"'IBM Plex Mono',monospace"}}>{v}</div>
                <div style={{color:B.muted,fontSize:10,marginTop:2}}>{l}</div>
              </div>
            ))}
          </div>
          {mvp&&<div style={{...S.card(),padding:"11px 15px",marginBottom:13,background:"linear-gradient(135deg,#1A0005,#2A0A00)",border:`1px solid ${B.red}33`,display:"flex",alignItems:"center",gap:11}}>
            <div style={{fontSize:22}}>MVP</div>
            <Av src={mvp.avatar} name={mvp.name} dept={mvp.role} size={38}/>
            <div style={{flex:1}}><div style={{color:B.red,fontSize:9,fontWeight:700,letterSpacing:3}}>{t.quarterMvp}</div><div style={{color:B.text,fontSize:14,fontWeight:800}}>{mvp.name}</div><div style={{color:B.muted,fontSize:10}}>{mvp.role}</div></div>
            <div style={{color:B.red,fontSize:22,fontWeight:900,fontFamily:"'IBM Plex Mono',monospace"}}>{mvp.total}</div>
          </div>}
          {DEPTS.filter(d=>isBoss||canManage?true:d===user.dept).map(dept=>{
            const emps=vis.filter(e=>e.role===dept);if(!emps.length)return null;const dc=DC[dept];
            return(
              <div key={dept} style={{marginBottom:15}}>
                <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:7}}>
                  <div style={{width:6,height:6,borderRadius:"50%",background:dc}}/><span style={{color:B.text,fontWeight:800,fontSize:12}}>{dept}</span><span style={{color:B.muted,fontSize:10}}>{emps.length} staff</span>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(185px,1fr))",gap:8}}>
                  {emps.map(emp=>{
                    const grade=emp.total!=null?getGrade(emp.total,CRIT[emp.role].t,bonusCfg):null;
                    return(
                      <div key={emp.id} onClick={()=>setSel(emp)} style={{...S.card(),padding:12,cursor:"pointer",transition:"border .2s",position:"relative",overflow:"hidden"}}
                        onMouseEnter={e=>e.currentTarget.style.borderColor=dc} onMouseLeave={e=>e.currentTarget.style.borderColor=B.border}>
                        <div style={{position:"absolute",top:0,left:0,width:3,height:"100%",background:dc}}/>
                        <div style={{paddingLeft:5}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:7}}>
                            <div style={{display:"flex",alignItems:"center",gap:7}}>
                              <Av src={emp.avatar} name={emp.name} dept={emp.role} size={36}/>
                              <div><div style={{color:B.text,fontWeight:800,fontSize:12}}>{emp.name}</div><div style={{color:dc,fontSize:9,marginTop:1}}>{emp.role}</div></div>
                            </div>
                            {grade&&<div style={{background:grade.color+"22",color:grade.color,borderRadius:4,padding:"1px 5px",fontSize:9,fontWeight:700}}>RM{grade.amount}</div>}
                          </div>
                          {emp.total!=null?(<div>
                            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{color:B.muted,fontSize:9}}>{t.score}</span><span style={{color:grade.color,fontWeight:800,fontSize:11,fontFamily:"'IBM Plex Mono',monospace"}}>{emp.total}</span></div>
                            <div style={{height:3,background:B.border,borderRadius:99,overflow:"hidden"}}><div style={{width:`${Math.min(emp.total,110)/110*100}%`,height:"100%",background:grade.color,borderRadius:99}}/></div>
                            <div style={{color:B.muted,fontSize:9,marginTop:2}}>{grade.label}</div>
                          </div>):<div style={{color:B.muted,fontSize:9}}>{canManage?t.tapToScore:t.pending}</div>}
                          {canManage&&<button onClick={e=>{e.stopPropagation();if(confirm(t.confirmDelete)){const upd=employees.filter(x=>x.id!==emp.id);setEmployees(upd);api.save("employees",upd);}}} style={{...S.btn("#2B0009","#E74C3C",{fontSize:9,padding:"2px 7px",marginTop:5,width:"100%"})}}>{t.delete}</button>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </>}
      </div>
      {showAddEmp&&canManage&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}}>
        <div style={{...S.card(),padding:21,width:"100%",maxWidth:330}}>
          <div style={{color:B.text,fontWeight:800,fontSize:15,marginBottom:15}}>{t.addStaff}</div>
          <div style={{marginBottom:9}}><div style={{color:B.muted,fontSize:10,marginBottom:3}}>{t.name}</div><input value={ne.name} onChange={e=>setNe(p=>({...p,name:e.target.value}))} style={S.inp}/></div>
          <div style={{marginBottom:15}}><div style={{color:B.muted,fontSize:10,marginBottom:3}}>{t.department}</div><select value={ne.role} onChange={e=>setNe(p=>({...p,role:e.target.value}))} style={{...S.inp,cursor:"pointer"}}>{DEPTS.map(d=><option key={d}>{d}</option>)}</select></div>
          <div style={{display:"flex",gap:7}}>
            <button onClick={()=>setShowAddEmp(false)} style={{...S.btn(B.border,B.muted,{flex:1})}}>{t.cancel}</button>
            <button onClick={()=>{if(!ne.name.trim())return;const upd=[...employees,{id:Date.now(),name:ne.name.trim(),role:ne.role,quarter,total:null,scores:{},avatar:null}];setEmployees(upd);api.save("employees",upd);setShowAddEmp(false);setNe({name:"",role:"Senior Tech"});}} style={{...S.btn(B.red,"#fff",{flex:2})}}>{t.add}</button>
          </div>
        </div>
      </div>}
    </div>
  );
}

// ── LOGIN ─────────────────────────────────────────────
function Login({users,logoUrl,onLogin,lang,setLang}){
  const [sel,setSel]=useState(null);const [pin,setPin]=useState("");const [err,setErr]=useState("");
  const tap=d=>{if(pin.length>=4)return;const next=pin+d;setPin(next);if(next.length===4){const u=users.find(u=>u.id===sel&&u.pin===next);if(u){onLogin(u);}else{setErr(T[lang]?.wrongPin||"Wrong PIN");setTimeout(()=>{setPin("");setErr("");},600);}}};
  const {t}=useLang();
  return(
    <div style={{minHeight:"100vh",background:B.dark,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{position:"absolute",top:16,right:16}}><LangSwitcher lang={lang} setLang={setLang}/></div>
      <div style={{marginBottom:20}}>{logoUrl?<img src={logoUrl} style={{height:42,objectFit:"contain"}}/>:<svg width="120" height="28" viewBox="0 0 120 28"><text x="0" y="22" fontFamily="Arial Black" fontSize="26" fontWeight="900" fill="#D0021B" fontStyle="italic">KC</text><text x="48" y="16" fontFamily="Arial" fontSize="11" fontWeight="700" fill="#FFF" letterSpacing="1">AUTO</text><text x="48" y="25" fontFamily="Arial" fontSize="8" fontWeight="600" fill="#666" letterSpacing="2">WORKSHOP</text></svg>}</div>
      <div style={{...S.card(),padding:19,width:"100%",maxWidth:350}}>
        <div style={{color:B.muted,fontSize:10,letterSpacing:3,textTransform:"uppercase",marginBottom:10}}>{t.selectAccount}</div>
        <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:13,maxHeight:270,overflowY:"auto"}}>
          {users.map(u=>(
            <button key={u.id} onClick={()=>{setSel(u.id);setPin("");setErr("");}} style={{...S.btn(sel===u.id?B.red:B.border,sel===u.id?"#fff":B.muted,{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",fontSize:12})}}>
              <Av src={u.avatar} name={u.name} dept={u.dept} size={26}/>
              <span style={{flex:1,textAlign:"left"}}>{u.name}</span>
              <span style={{fontSize:9,opacity:0.6}}>{RL[u.role]}{u.dept?" - "+u.dept:""}</span>
            </button>
          ))}
        </div>
        {sel&&<>
          <div style={{color:B.muted,fontSize:10,letterSpacing:2,marginBottom:8}}>{t.enterPin}</div>
          <div style={{display:"flex",gap:7,justifyContent:"center",marginBottom:10}}>{[0,1,2,3].map(i=><div key={i} style={{width:34,height:34,borderRadius:8,background:i<pin.length?B.red:B.border,transition:"all .2s"}}/>)}</div>
          {err&&<div style={{color:B.red,fontSize:11,textAlign:"center",marginBottom:6}}>{t.wrongPin}</div>}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>{[1,2,3,4,5,6,7,8,9,"",0,"X"].map((d,i)=><button key={i} onClick={()=>d==="X"?setPin(p=>p.slice(0,-1)):d!==""&&tap(String(d))} style={{...S.btn(d==="X"?"#2A0008":B.border,d==="X"?B.red:B.text,{padding:"10px",fontSize:15,fontWeight:800,opacity:d===""?0:1,pointerEvents:d===""?"none":"auto"})}}>{d}</button>)}</div>
        </>}
      </div>
      <div style={{color:B.muted,fontSize:9,marginTop:11}}>KC Auto Workshop KPI System v5</div>
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────
function App(){
  const [lang,setLang]=useState(()=>localStorage.getItem('kc_lang')||'en');
  const t=T[lang]||T.en;
  const handleLang=l=>{setLang(l);localStorage.setItem('kc_lang',l);};
  const [user,setUser]=useState(null);
  const [ready,setReady]=useState(false);
  const [users,setUsers]=useState([]);
  const [employees,setEmployees]=useState([]);
  const [vehicles,setVehicles]=useState([]);
  const [logoUrl,setLogoUrl]=useState(null);
  const [bonusCfg,setBonusCfg]=useState(DEF_BONUS);
  const [feedbacks,setFeedbacks]=useState([]);

  useEffect(()=>{
    api.load().then(d=>{
      setUsers(d.users||DEF_USERS);
      setEmployees(d.employees||DEF_EMP);
      setVehicles(d.vehicles||[]);
      setLogoUrl(d.logoUrl||null);
      setBonusCfg(d.bonusConfig||DEF_BONUS);
      setFeedbacks(d.feedbacks||[]);
      setReady(true);
    }).catch(()=>{setUsers(DEF_USERS);setEmployees(DEF_EMP);setReady(true);});
  },[]);

  if(!ready)return<div style={{minHeight:"100vh",background:B.dark,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:B.red,fontWeight:700}}>Loading...</div></div>;
  return(
    <LangContext.Provider value={{lang,t,setLang:handleLang}}>
      {!user
        ?<Login users={users} logoUrl={logoUrl} onLogin={setUser} lang={lang} setLang={handleLang}/>
        :<Dashboard user={user} users={users} setUsers={setUsers} logoUrl={logoUrl} setLogoUrl={setLogoUrl}
            employees={employees} setEmployees={setEmployees} vehicles={vehicles} setVehicles={setVehicles}
            bonusCfg={bonusCfg} setBonusCfg={setBonusCfg} feedbacks={feedbacks} setFeedbacks={setFeedbacks}
            onLogout={()=>setUser(null)}/>}
    </LangContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
